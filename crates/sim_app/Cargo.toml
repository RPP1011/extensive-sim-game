[package]
name = "sim_app"
version = "0.1.0"
edition = "2021"

# Generic application crate. Drives any compiled-sim runtime through
# the `engine::CompiledSim` trait — no per-fixture types are imported
# here. Switching from boids to a future fixture means changing the
# `package = "..."` rename below to the target's runtime crate name;
# nothing in src/ needs to change.

[dependencies]
engine = { path = "../engine" }
glam = "0.29"

# The boids fixture, aliased to a fixture-agnostic name so the
# original sim_app harness in src/main.rs stays sim-agnostic.
sim_runtime = { path = "../boids_runtime", package = "boids_runtime" }
# Sibling per-creature predator/prey demo. Imported under its real
# name (no rename) — the pp_app binary in src/pp_app.rs is fixture-
# aware and introspects per-creature counts via the runtime API.
predator_prey_runtime = { path = "../predator_prey_runtime" }
# Particle collision sibling fixture — pc_app drives it through the
# CompiledSim trait.
particle_collision_runtime = { path = "../particle_collision_runtime" }
# Crowd navigation sibling fixture — cn_app drives it.
crowd_navigation_runtime = { path = "../crowd_navigation_runtime" }
# Target-chaser stress fixture for slice 1 (cross-agent target reads).
target_chaser_runtime = { path = "../target_chaser_runtime" }
# Swarm-event-storm stress fixture for Phase 7+8 primitives (multi-emit
# producer + 2 view-folds with @decay anchor).
swarm_storm_runtime = { path = "../swarm_storm_runtime" }
# Bartering fixture — entity-root coverage probe (Item + Group entity
# declarations + ItemId in event payload).
bartering_runtime = { path = "../bartering_runtime" }
# Ecosystem-cascade fixture — three-tier event cascade (Plant ←
# Herbivore ← Carnivore) with two distinct event kinds and three
# @decay-anchored views.
ecosystem_runtime = { path = "../ecosystem_runtime" }
# Foraging-colony fixture — single-Agent SoA + Item / Group entity
# declarations (declaration-only today) + per-tick Drop emit folded
# into a `@decay`-anchored pheromone_deposits view.
foraging_runtime = { path = "../foraging_runtime" }
# Auction-market fixture — first to exercise the `auctions.*`
# namespace lowering (B1 stub `auctions_place_bid(...) -> bool`).
# Per-tick Bid emit folded into bid_activity (@decay) AND
# good_bid_total (no decay) — stresses both fold paths in one fixture.
auction_runtime = { path = "../auction_runtime" }
# Verb-fire probe — discovery probe of the verb cascade end-to-end.
verb_probe_runtime = { path = "../verb_probe_runtime" }
# ToM probe — discovery probe of the Theory-of-Mind belief-read path.
tom_probe_runtime = { path = "../tom_probe_runtime" }
# Trade-market probe — first fixture combining multi-event-kind ring
# (TradeExecuted + PriceObserved) + ToM-shape pair_map u32 view +
# mixed view-fold storage (u32 + f32 @decay + f32 no-decay) +
# multiple Item entity declarations in one program.
trade_market_runtime = { path = "../trade_market_runtime" }
# Abilities probe — smallest end-to-end probe of the ability system
# (two competing verbs Strike+Heal, two event kinds DamageDealt+Healed,
# two view-folds damage_total+healing_done).
abilities_runtime = { path = "../abilities_runtime" }
# Cooldown probe — follow-up to abilities_probe Gap #4. Drives the
# per-agent cooldown_next_ready_tick SoA + world.tick preamble +
# `if (tick >= ready_at) { emit }` gating end-to-end.
cooldown_probe_runtime = { path = "../cooldown_probe_runtime" }
# Diplomacy probe — first fixture combining ALL of: pair_map u32 view
# (ToM shape), verb cascade with TWO competing verbs gated on
# disjoint Mod-tick predicates, three distinct event kinds in one
# ring with per-handler tag filters, two Group entity declarations.
diplomacy_probe_runtime = { path = "../diplomacy_probe_runtime" }
# Stochastic probe — discovery probe of the `rng.*` namespace in a
# real per-agent physics body. First fixture to exercise
# `rng.action()` end-to-end with a per-tick activation gate;
# verifies P5 determinism and per-slot binomial convergence.
stochastic_probe_runtime = { path = "../stochastic_probe_runtime" }
# Pair-scoring probe — discovery probe of PAIR-FIELD SCORING (spec
# §8.3). Attempts the canonical `target.<field>` pattern in a verb's
# scoring expression. Outcome (b) NO FIRE — the gap chain is
# documented in docs/superpowers/notes/2026-05-04-pair_scoring_probe.md.
pair_scoring_probe_runtime = { path = "../pair_scoring_probe_runtime" }
# Stdlib math probe — discovery probe stress-testing under-exercised
# stdlib math + RNG conversion surfaces. Surfaces 5 gaps (Gaps #A-#E)
# in `docs/superpowers/notes/2026-05-04-stdlib_math_probe.md`. The
# probe body retains only the surfaces that actually wire through;
# four omitted-gap surfaces stay commented in the .sim with citations
# to the responsible compiler arms.
stdlib_math_probe_runtime = { path = "../stdlib_math_probe_runtime" }
# Quest probe — discovery probe of `entity X : Quest` AND the
# `quests.*` namespace. Both surfaces are documented in spec but
# never exercised by any prior fixture. Surfaces THREE gaps:
# (A) `EntityRoot::Quest` not in the parser's accept set, (B) `quests.*`
# namespace registered in the resolver but ZERO methods in the CG
# registry, (C) `+= 1u` on a u32-result view silently lowers to
# `atomicOr` per the result-type-only emit branch. See
# `docs/superpowers/notes/2026-05-04-quest_probe.md`.
quest_probe_runtime = { path = "../quest_probe_runtime" }
# Duel 1v1 — first REAL gameplay-shaped fixture (not a coverage
# probe). Two Combatants duel with three abilities (Strike, Spell,
# Heal) compiled through the verb cascade + cooldown gates + pair-
# field scoring + multi-event-kind ring. Surfaces 6 gaps and closes
# 3 inline (set_hp/set_alive/set_mana setters + non-self target,
# PerPair tick preamble, Bool LHS rewrite). See
# `docs/superpowers/notes/2026-05-04-duel_1v1.md`.
duel_1v1_runtime = { path = "../duel_1v1_runtime" }
# Duel 25v25 — first SCALE-UP fixture (25 Red vs 25 Blue squad
# scuffle). Sidesteps duel_1v1's PerPair `mask_k=1u` placeholder
# (Gap W) by doing target-finding via spatial body-form physics.
# Per-tick: spatial-hash → ScanAndStrike (per-agent walk + emit
# Damaged for cross-team neighbours) → ApplyDamage chronicle.
# Discovery doc: docs/superpowers/notes/2026-05-04-duel_25v25.md.
duel_25v25_runtime = { path = "../duel_25v25_runtime" }
# Duel abilities — Wave 1 acceptance fixture for the .ability DSL pipeline.
# Mirrors duel_1v1's verb-cascade shape (Strike/ShieldUp/Mend) but the
# constants are hand-mirrored from `assets/ability_test/duel_abilities/*.ability`
# and the runtime asserts at startup that the .ability files lower to
# AbilityProgram values matching the .sim's hand-mirrored verb constants.
# This binding check is the proof that the
# parser → ability_lower → AbilityRegistry → PackedAbilityRegistry pipeline
# produces values consumable by a real sim. See
# `docs/spec/ability_dsl_test_sims.md` Wave 1 acceptance.
duel_abilities_runtime = { path = "../duel_abilities_runtime" }
# Foraging-real — first LIFECYCLE fixture. Demonstrates alive=false →
# true births (CPU-side slot allocation) AND alive=true → false deaths
# (DSL EnergyDecay) actually flipping during a single run. Surfaces
# the alive-bitmap-flip-both-directions architectural surface no prior
# fixture has exercised. See `assets/sim/foraging_real.sim`.
foraging_real_runtime = { path = "../foraging_real_runtime" }
# Predator-prey real — fourth REAL fixture: COMBAT + LIFECYCLE composed
# on TWO simultaneously-live creature types. Wolves hunt sheep via
# spatial body-form (WolfHunt → Damaged → ApplyKill chronicle) AND
# breed off kill-credit; sheep graze, breed off well-fed-pair check,
# AND die both via combat (set_alive on hp<=0) and starvation (set_alive
# on hunger<=0). Five distinct alive-bitmap-flip surfaces fire across
# both species in a single run. See `assets/sim/predator_prey_real.sim`.
predator_prey_real_runtime = { path = "../predator_prey_real_runtime" }
# Tactical squad 5v5 — FIFTH real fixture. 5 vs 5 with role distribution
# (Tank + Healer + 3 DPS per team). First fixture to actually exercise
# pair-field scoring for target selection (DPS picks lowest-HP enemy;
# Healer picks lowest-HP ally) — the duel_1v1 had pair-field scoring
# but the 2-agent population trivialised the argmax. Closes the
# verb-mask `mask_k=1u` placeholder gap inline (Task 5.7).
tactical_squad_5v5_runtime = { path = "../tactical_squad_5v5_runtime" }
# Mass-battle 100 vs 100 — sixth REAL gameplay-shaped fixture and
# the first SCALE-UP for pair-field scoring (200 agents,
# agent_cap × agent_cap mask grid). 10 Tank + 10 Healer + 80 DPS
# per team × 2 teams. Stress-tests the per-pair mask + scoring
# kernels at workloads beyond the duel_1v1 template (2 agents).
mass_battle_100v100_runtime = { path = "../mass_battle_100v100_runtime" }
# Trade-market-real — seventh REAL gameplay-shaped fixture and the
# first to drive ECONOMIC gameplay. 50 Traders + 10 Goods share an
# Agent SoA via mana-marker discrimination; pair-field scoring picks
# the cheapest in-stock good per trader per tick. First sim to read
# a real `items.base_price(0)` field from an Item entity in a verb's
# `when` clause.
trade_market_real_runtime = { path = "../trade_market_real_runtime" }
# Quest Arc Real — EIGHTH real fixture and FIRST sim with multi-
# stage per-agent state machines. 30 Adventurers each cycle through
# 5 stages (Accept→Hunt→Collect→Return→Complete→reset) with stage
# state encoded in the per-agent `mana` SoA field. Composes
# duel_1v1's verb-cascade + chronicle pipeline with mana-as-stage-
# register for the FSM.
quest_arc_real_runtime = { path = "../quest_arc_real_runtime" }
# Village Day Cycle — NINTH real fixture and FIRST composite gameplay
# sim. 30 Villagers cycle through a 4-phase day (Morning Work →
# Midday Trade → Evening Eat → Night Rest) gated by `world.tick % 100`
# arithmetic, plus periodic energy drain and starvation.
village_day_cycle_runtime = { path = "../village_day_cycle_runtime" }
# Megaswarm 1000 — TENTH real fixture and the second SCALE-UP for
# pair-field scoring (1000 agents → 1M mask cells per tick, 5x the
# per-tick workload of mass_battle_100v100). 500 Red + 500 Blue
# free-for-all with ONE verb (Strike). Performance probe — answers
# "does pair-field scoring scale to 1000² without spatial narrowing?"
megaswarm_1000_runtime = { path = "../megaswarm_1000_runtime" }
# Tactical horde 500 — ELEVENTH real fixture. Combines mass_battle_100v100's
# 3-verb cascade (Tank Strike + DPS Snipe + Healer Heal) with megaswarm_1000's
# 1000-agent population, so pair-field scoring runs THREE verbs against
# 1M cells/verb = 3M mask cells/tick. Tests whether multi-verb cascade
# at 1000-agent scale holds together — the load-bearing question for
# unit-scale tactical strategy gameplay.
tactical_horde_500_runtime = { path = "../tactical_horde_500_runtime" }
# Trophic 3-tier — TWELFTH REAL fixture and FIRST three-tier food web.
# Grass (creature_type=0) + Herbivore (1) + Carnivore (2) all in a
# single shared Agent SoA. Builds on predator_prey_real but replaces
# the uniform graze_rate proxy with a real Grass entity that herbivores
# actually deplete via Eat→ApplyEat chronicle. 1000-tick run probes
# long-term ecological equilibrium.
trophic_3tier_runtime = { path = "../trophic_3tier_runtime" }
# Flocking skirmish — THIRTEENTH REAL fixture and FIRST to bring boids
# dynamics into a combat context. 100 Red + 100 Blue agents share one
# Agent SoA via the `creature_type` discriminant; same-team neighbours
# trigger flocking (alignment+cohesion+separation), opposing-team
# neighbours trigger combat (chase/flee + HP attrition).
flocking_skirmish_runtime = { path = "../flocking_skirmish_runtime" }
# Tower defense — fourteenth REAL fixture and first GAME-SHAPED sim
# (not a duel, not a probe). 1 base + 10 defenders + 100 enemy slots;
# CPU-side wave spawner walks enemy slots every K ticks. Composes
# verb cascade + per-agent physics + multi-event-kind ring +
# non-self target setters into a recognizable TD gameplay loop.
tower_defense_runtime = { path = "../tower_defense_runtime" }
# Boss fight — fifteenth REAL fixture and first ASYMMETRIC RPG combat
# (1 Boss vs 5 Heroes with cooldown-gated abilities + phase-based
# boss self-heal). Closest approximation to actual game encounter
# combat across all prior sims.
boss_fight_runtime = { path = "../boss_fight_runtime" }
# Megaswarm 10000 — sixteenth REAL fixture and the third SCALE-UP for
# pair-field scoring (10000 agents → 100M mask cells/verb/tick, 100x
# mass_battle_100v100 and 10x megaswarm_1000). First fixture to exceed
# `max_compute_workgroups_per_dimension` (typically 65535) on a single
# PerPair dispatch — handled by chunked 1D dispatches with cfg._pad0
# repurposed as `pair_offset`. Performance probe: does pair-field
# scoring stay competitive past the per-dispatch hardware ceiling?
megaswarm_10000_runtime = { path = "../megaswarm_10000_runtime" }
# Objective Capture 10v10 — seventeenth REAL fixture and first
# COMPETITIVE OBJECTIVE-CONTROL gameplay. 10 Red vs 10 Blue race for
# hold time on a central control point. Two-layer execution: GPU
# runs the compiled .sim (verb cascade + chronicle + view-fold) for
# end-to-end smoke; host-side authoritative layer drives the real
# 10v10 (team-filtered targeting, movement-toward-objective, contest
# scoring).
objective_capture_10v10_runtime = { path = "../objective_capture_10v10_runtime" }
# Scripted battle — eighteenth REAL fixture and FIRST sim with a one-way
# scripted narrative arc. Three phases (peaceful gather → assault →
# aftermath) gated on world.tick — different verbs fire in different
# phases. Adds `world.tick >= L && world.tick < R` phase-gate predicates
# in `when` clauses.
scripted_battle_runtime = { path = "../scripted_battle_runtime" }
# Multi-zone world — nineteenth REAL fixture and FIRST sim with
# per-agent location-based context (zone migration). Each agent's
# `level` u32 encodes a zone id (Forest/Town/Dungeon); verbs gate on
# `when self.level == X`. Migration is CPU-side per-tick.
multi_zone_world_runtime = { path = "../multi_zone_world_runtime" }
# Dungeon crawl — 20th REAL fixture and FIRST sim with multi-
# encounter sequencing (rooms cleared in series). DSL is duel_1v1's
# verb cascade; CPU-side runtime spawns next room's enemies when the
# prior room clears.
dungeon_crawl_runtime = { path = "../dungeon_crawl_runtime" }
# Crafting diffusion — 21st REAL fixture and FIRST sim where state
# propagates through agent interactions (knowledge bits via trade,
# not damage). 5 groups × 10 traders, each starts with 2 recipe bits
# in mana; trade meetings union the bitmasks. Convergence: every
# agent learns every recipe through the trade graph.
crafting_diffusion_runtime = { path = "../crafting_diffusion_runtime" }

