[package]
name = "sim_app"
version = "0.1.0"
edition = "2021"

# Generic application crate. Drives any compiled-sim runtime through
# the `engine::CompiledSim` trait — no per-fixture types are imported
# here. Switching from boids to a future fixture means changing the
# `package = "..."` rename below to the target's runtime crate name;
# nothing in src/ needs to change.

[dependencies]
engine = { path = "../engine" }
glam = "0.29"

# The boids fixture, aliased to a fixture-agnostic name so the
# original sim_app harness in src/main.rs stays sim-agnostic.
sim_runtime = { path = "../boids_runtime", package = "boids_runtime" }
# Sibling per-creature predator/prey demo. Imported under its real
# name (no rename) — the pp_app binary in src/pp_app.rs is fixture-
# aware and introspects per-creature counts via the runtime API.
predator_prey_runtime = { path = "../predator_prey_runtime" }
# Particle collision sibling fixture — pc_app drives it through the
# CompiledSim trait.
particle_collision_runtime = { path = "../particle_collision_runtime" }
# Crowd navigation sibling fixture — cn_app drives it.
crowd_navigation_runtime = { path = "../crowd_navigation_runtime" }
# Target-chaser stress fixture for slice 1 (cross-agent target reads).
target_chaser_runtime = { path = "../target_chaser_runtime" }
# Swarm-event-storm stress fixture for Phase 7+8 primitives (multi-emit
# producer + 2 view-folds with @decay anchor).
swarm_storm_runtime = { path = "../swarm_storm_runtime" }
# Bartering fixture — entity-root coverage probe (Item + Group entity
# declarations + ItemId in event payload).
bartering_runtime = { path = "../bartering_runtime" }
# Ecosystem-cascade fixture — three-tier event cascade (Plant ←
# Herbivore ← Carnivore) with two distinct event kinds and three
# @decay-anchored views.
ecosystem_runtime = { path = "../ecosystem_runtime" }
# Foraging-colony fixture — single-Agent SoA + Item / Group entity
# declarations (declaration-only today) + per-tick Drop emit folded
# into a `@decay`-anchored pheromone_deposits view.
foraging_runtime = { path = "../foraging_runtime" }
# Auction-market fixture — first to exercise the `auctions.*`
# namespace lowering (B1 stub `auctions_place_bid(...) -> bool`).
# Per-tick Bid emit folded into bid_activity (@decay) AND
# good_bid_total (no decay) — stresses both fold paths in one fixture.
auction_runtime = { path = "../auction_runtime" }
# Verb-fire probe — discovery probe of the verb cascade end-to-end.
verb_probe_runtime = { path = "../verb_probe_runtime" }
# ToM probe — discovery probe of the Theory-of-Mind belief-read path.
tom_probe_runtime = { path = "../tom_probe_runtime" }
# Trade-market probe — first fixture combining multi-event-kind ring
# (TradeExecuted + PriceObserved) + ToM-shape pair_map u32 view +
# mixed view-fold storage (u32 + f32 @decay + f32 no-decay) +
# multiple Item entity declarations in one program.
trade_market_runtime = { path = "../trade_market_runtime" }
# Abilities probe — smallest end-to-end probe of the ability system
# (two competing verbs Strike+Heal, two event kinds DamageDealt+Healed,
# two view-folds damage_total+healing_done).
abilities_runtime = { path = "../abilities_runtime" }
# Cooldown probe — follow-up to abilities_probe Gap #4. Drives the
# per-agent cooldown_next_ready_tick SoA + world.tick preamble +
# `if (tick >= ready_at) { emit }` gating end-to-end.
cooldown_probe_runtime = { path = "../cooldown_probe_runtime" }
# Diplomacy probe — first fixture combining ALL of: pair_map u32 view
# (ToM shape), verb cascade with TWO competing verbs gated on
# disjoint Mod-tick predicates, three distinct event kinds in one
# ring with per-handler tag filters, two Group entity declarations.
diplomacy_probe_runtime = { path = "../diplomacy_probe_runtime" }

[[bin]]
name = "sim_app"
path = "src/main.rs"

