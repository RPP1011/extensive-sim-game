[package]
name = "tom_probe_runtime"
version = "0.1.0"
edition = "2021"
build = "build.rs"

# Per-fixture runtime crate for `assets/sim/tom_probe.sim` — the
# smallest end-to-end probe of the Theory-of-Mind belief-read path.
# Mirrors `verb_probe_runtime`'s build.rs / src/lib.rs shape.
#
# This crate is a discovery probe — it intentionally has no smoke /
# observable test that asserts > 0 fact_witnesses values because the
# belief-read lowering is rejected at CG-lower time today (see the
# discovery report at `docs/superpowers/notes/2026-05-04-tom-probe.md`
# for the gap chain). The accompanying `tom_probe_app` binary in
# `sim_app` reports observed counts so the gap surfaces as data,
# not a panic.

[dependencies]
engine = { path = "../engine" }
wgpu = "=26.0.1"
bytemuck = { version = "1.16", features = ["derive"] }
glam = "0.29"
pollster = "0.4"
dsl_compiler = { path = "../dsl_compiler" }

[build-dependencies]
dsl_ast = { path = "../dsl_ast" }
dsl_compiler = { path = "../dsl_compiler" }
