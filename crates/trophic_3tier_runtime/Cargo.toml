[package]
name = "trophic_3tier_runtime"
version = "0.1.0"
edition = "2021"
build = "build.rs"

# Per-fixture runtime for `assets/sim/trophic_3tier.sim` — TWELFTH REAL
# fixture: three-tier food web (Grass → Herbivore → Carnivore) composed
# in a single shared Agent SoA.
#
# Mirrors `predator_prey_real_runtime` for the spatial body-form +
# chronicle-physics + CPU-side birth-slot scaffolding. Extends to a
# THIRD tier (Grass) with passive per-tick regrowth + a CPU-side
# respawn that flips dead Grass tiles back alive when their density
# would have grown past the eat_threshold.
#
# build.rs lowers the .sim through the DSL compiler into
# `OUT_DIR/generated.rs`; src/lib.rs owns the GPU context, per-buffer
# storage, kernel cache, and per-tick dispatch chain.

[dependencies]
engine = { path = "../engine" }
wgpu = "=26.0.1"
bytemuck = { version = "1.16", features = ["derive"] }
glam = "0.29"
pollster = "0.4"
dsl_compiler = { path = "../dsl_compiler" }

[build-dependencies]
dsl_ast = { path = "../dsl_ast" }
dsl_compiler = { path = "../dsl_compiler" }
