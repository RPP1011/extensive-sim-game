[package]
name = "quest_arc_real_runtime"
version = "0.1.0"
edition = "2021"
build = "build.rs"

# Per-fixture runtime crate for `assets/sim/quest_arc_real.sim` —
# the EIGHTH real gameplay-shaped fixture (and the FIRST sim with
# multi-stage per-agent state machines). 30 Adventurers each
# independently cycle through a 5-stage quest arc; stage state is
# encoded in the per-agent `mana` SoA field (f32 0.0..=4.0).
# Mirrors `duel_1v1_runtime` shape: build.rs lowers the .sim
# through the DSL compiler into `OUT_DIR/generated.rs`; src/lib.rs
# owns the GPU context, per-buffer storage, kernel cache, and per-
# tick dispatch chain.

[dependencies]
engine = { path = "../engine" }
wgpu = "=26.0.1"
bytemuck = { version = "1.16", features = ["derive"] }
glam = "0.29"
pollster = "0.4"
dsl_compiler = { path = "../dsl_compiler" }

[build-dependencies]
dsl_ast = { path = "../dsl_ast" }
dsl_compiler = { path = "../dsl_compiler" }
