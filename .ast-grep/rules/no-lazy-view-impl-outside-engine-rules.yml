id: no-lazy-view-impl-outside-engine-rules
language: rust
severity: error
message: |
  `impl LazyView` must live in crates/engine_rules/. Hand-written
  view implementations violate P1 (Compiler-First). Edit assets/sim/*.sim
  and let dsl_compiler emit the view.
rule:
  any:
    - pattern: impl LazyView<$_> for $T { $$$ }
    - pattern: impl $$$::LazyView<$_> for $T { $$$ }
ignores:
  - "crates/engine_rules/**"
  - "crates/engine/tests/**"
  - "crates/engine/src/view/lazy.rs"
  - "crates/engine/src/view/**"
