# Tier 3: Lord/Warden — represents multiple factions or a coalition.
# Their power reflects the combined strength of allied groups.

name = "Lord"
tier_index = 3
description = "A unifying force. Their authority spans factions and their power reflects the coalition they've built."

[requirements]
min_level = 7
min_quests_completed = 30
min_fame = 150.0
# Must have 2+ factions at Coalition or Friendly stance
min_allied_factions = 2
# Must have completed a lord trial quest
min_group_size = 12

[flat_bonuses]
attack = 15.0
defense = 12.0
max_hp = 80.0
resolve = 30.0
speed = 3.0
ability_power = 10.0

[scaling]
# Scales with combined coalition strength
coefficient = 0.10
source = "coalition_strength"
# At combined coalition strength 300: 0.10 * 300 = 30.0 → 1.30× multiplier
# Coalition of 3 factions at 100 each = 300 → very strong

[behavior]
required_actions = ["ProposeCoalition", "DiplomaticAction", "RequestCoalitionAid"]
idle_decay_ticks = 2000
decay_rate = 0.04
betrayal_actions = ["Break coalition", "Attack allied faction"]
betrayal_fame_penalty = -200.0

[demotion]
fame_threshold = 20.0
trigger = "coalition_collapse_or_betrayal"
fall_to_tier = 2  # Falls to Champion
