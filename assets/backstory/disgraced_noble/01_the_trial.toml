name = "The Trial"
world_template = "Civil War"
sequence = 1
default_option = 2
prompt = "The grand hall of Crown's Landing falls silent as the Lord Chancellor reads the charges. Treason against the realm. The evidence is forged — you know it, and so do half the nobles watching. But knowing and proving are different things. The guards tighten their grip on your arms."

[[options]]
label = "Fight the Charges"
description = "You demand a trial by testimony, calling witnesses and challenging every fabricated document. Days of interrogation and a stint in the dungeon leave their mark, but you expose cracks in the conspiracy."
pc_traits = [{ trait = "battle_scarred" }]
pc_stats = { attack = 3.0, defense = 2.0, injury = 20.0 }
effects = [
    { type = "narrative", text = "You fought the charges tooth and nail. The bruises from the dungeon have faded, but the fire hasn't." },
    { type = "reputation", amount = 5.0 },
]

[[options]]
label = "Flee Before the Verdict"
description = "You read the room — the verdict was decided before the trial began. In the chaos of a recess, you slip through a servant's passage, grabbing coin and correspondence on your way out."
pc_traits = [{ trait = "pragmatist" }]
pc_stats = { speed = 3.0 }
effects = [
    { type = "gold", amount = 40.0 },
    { type = "narrative", text = "You vanished before they could close the cage. Coward or survivor — history will decide." },
]

[[options]]
label = "Accept Exile with Dignity"
description = "You stand tall as the sentence is read. You bow to the court, remove your signet ring, and walk out under your own power. The crowd parts in silence. Some weep."
pc_traits = [{ trait = "diplomat_born" }]
pc_stats = { resolve = 4.0 }
effects = [
    { type = "reputation", amount = 15.0 },
    { type = "narrative", text = "You left Crown's Landing with nothing but your name — and the public's sympathy." },
]
