[workspace]
members = [".", "crates/ability_operator", "crates/tactical_sim", "crates/ability-vae"]
exclude = ["crates/combat-trainer"]  # depends on rl4burn which may not build

[workspace.dependencies]
# tack = { path = "../tack" }  # disabled — project not present locally
rl4burn = { git = "https://github.com/RPP1011/rl4burn", version = "0.2.0" }

[package]
name = "game"
version = "0.1.0"
edition = "2021"
autobins = false

[[bin]]
name = "xtask"
path = "src/bin/xtask/main.rs"

[features]
default = []
app = []
stream-monitor = ["tactical_sim/stream-monitor"]
burn-gpu = ["tactical_sim/burn-gpu"]
burn-cpu = ["tactical_sim/burn-cpu"]
profile-systems = []

[dependencies]
# tack = { workspace = true }  # disabled — project not present locally
tactical_sim = { path = "crates/tactical_sim" }
rl4burn = { workspace = true }
clap = { version = "4.5", features = ["derive"] }
rand = "0.10.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
image = "0.25"
rayon = "1.10"
crossbeam-channel = "0.5"
ndarray = "0.16"
ndarray-npy = { version = "0.9", features = ["npz"] }
zip = { version = "2.4", default-features = false }
memmap2 = "0.9"
ureq = { version = "3", features = ["json"] }
crossterm = { version = "0.28", features = ["event-stream"] }
tungstenite = "0.29.0"

[dev-dependencies]
proptest = "1.6"
