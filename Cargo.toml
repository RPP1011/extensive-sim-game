[workspace]
members = [".", "crates/tactical_sim", "crates/engine", "crates/engine_rules", "crates/viz", "crates/dsl_compiler"]
exclude = ["crates/world_sim_bench"]


[package]
name = "game"
version = "0.1.0"
edition = "2021"
autobins = false

[[bin]]
name = "xtask"
path = "src/bin/xtask/main.rs"

[features]
default = []
app = ["voxel_engine/app-harness", "dep:winit"]
stream-monitor = []
burn-gpu = ["dep:burn", "burn/tch", "burn/autodiff"]
burn-cpu = ["dep:burn", "burn/ndarray"]
profile-systems = []

[dependencies]
voxel_engine = { path = "/home/ricky/Projects/voxel_engine" }
anyhow = "1"
glam = "0.29"
winit = { version = "0.30", optional = true }
tactical_sim = { path = "crates/tactical_sim" }
dsl_compiler = { path = "crates/dsl_compiler" }
engine = { path = "crates/engine" }
contracts = "0.6"
winnow = "0.7"
burn = { version = "0.20", default-features = false, features = ["std"], optional = true }
rl4burn = { git = "https://github.com/RPP1011/rl4burn", features = ["tensorboard"] }
clap = { version = "4.5", features = ["derive"] }
rand = "0.10.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
image = "0.25"
rayon = "1.10"
ahash = "0.8"
crossbeam-channel = "0.5"
ndarray = "0.16"
ndarray-npy = { version = "0.9", features = ["npz"] }
zip = { version = "2.4", default-features = false }
memmap2 = "0.9"
ureq = { version = "3", features = ["json"] }
crossterm = { version = "0.28", features = ["event-stream"] }
tungstenite = "0.29.0"

[dev-dependencies]
proptest = "1.6"

[profile.release]
# LTO lets the compiler inline across the voxel_engine crate boundary,
# which matters a lot for the hot render loop: bulk_touch_all_loaded,
# pool_generation, and the camera accessors all cross-crate calls that
# are ~1 cycle bodies but cost a call+return without LTO. At 20 M+ FPS
# (~48 ns/frame), a couple of eliminated function calls per frame is
# worth the extra link time. `thin` captures most of fat's benefit
# with less link time and better i-cache locality (fat sometimes
# hurts at this perf level by inlining too aggressively).
lto = "thin"
codegen-units = 1
