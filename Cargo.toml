[workspace]
members = [".", "crates/ability_operator", "crates/tactical_sim", "crates/combat-trainer", "crates/ability-vae", "crates/headless_campaign"]

[package]
name = "bevy_game"
version = "0.1.0"
edition = "2021"

[features]
default = []
app = []
stream-monitor = ["tactical_sim/stream-monitor"]
burn-gpu = ["tactical_sim/burn-gpu"]
burn-cpu = ["tactical_sim/burn-cpu"]

[dependencies]
tack = { path = "../tack" }
tactical_sim = { path = "crates/tactical_sim" }
headless_campaign = { path = "crates/headless_campaign", features = ["combat-bridge"] }
bevy = { version = "0.13.2", features = ["jpeg"] }
bevy_egui = "0.27"
clap = { version = "4.5", features = ["derive"] }
rand = "0.10.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
image = "0.25"
rayon = "1.10"
crossbeam-channel = "0.5"
ndarray = "0.16"
ndarray-npy = { version = "0.9", features = ["npz"] }
memmap2 = "0.9"
ureq = { version = "3", features = ["json"] }

[dev-dependencies]
proptest = "1.6"

