[workspace]
members = ["."]


[package]
name = "game"
version = "0.1.0"
edition = "2021"
autobins = false

[[bin]]
name = "xtask"
path = "src/bin/xtask/main.rs"

[features]
default = []
app = []
stream-monitor = []
burn-gpu = ["dep:burn", "burn/tch", "burn/autodiff"]
burn-cpu = ["dep:burn", "burn/ndarray"]
profile-systems = []

[dependencies]
voxel_engine = { path = "../voxel_engine" }
contracts = "0.6"
winnow = "0.7"
burn = { version = "0.20", default-features = false, features = ["std"], optional = true }
rl4burn = { git = "https://github.com/RPP1011/rl4burn", features = ["tensorboard"] }
clap = { version = "4.5", features = ["derive"] }
rand = "0.10.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
image = "0.25"
rayon = "1.10"
crossbeam-channel = "0.5"
ndarray = "0.16"
ndarray-npy = { version = "0.9", features = ["npz"] }
zip = { version = "2.4", default-features = false }
memmap2 = "0.9"
ureq = { version = "3", features = ["json"] }
crossterm = { version = "0.28", features = ["event-stream"] }
tungstenite = "0.29.0"

[dev-dependencies]
proptest = "1.6"
