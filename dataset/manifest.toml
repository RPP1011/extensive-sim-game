# Ability Dataset Manifest
# Tags allow querying abilities by functionality.
#
# Tag vocabulary:
#   Effect:    damage, heal, shield, dot, hot
#   CC:        stun, slow, root, silence, fear, taunt, knockback, pull, blind
#   Mobility:  dash, knockback, pull
#   Buff:      buff, debuff, damage_modify
#   Targeting: single_target, aoe, self_cast, ground_target
#   Area:      circle, cone, line, spread, ring
#   Delivery:  projectile, chain, zone, trap
#   Condition: conditional, hp_threshold, status_trigger, hit_count
#   Special:   execute, self_damage, lifesteal
#   Tier:      tier1, tier2, tier3, tier4, tier5, tier6, tier7

