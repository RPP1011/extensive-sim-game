[[tactics]]
id = "call_for_aid"
name = "Call for Aid"
side = "defender"
category = "patience"

[tactics.requirements]
signal_tower_available = true
allies_within_range = true

[tactics.effects]
siege_duration_multiplier = 1.0
reinforcement_chance_bonus = 0.3
