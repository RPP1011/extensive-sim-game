[[tactics]]
id = "sapper_approach"
name = "Sapper Approach"
side = "attacker"
category = "engineering"

[tactics.requirements]
min_army_ratio = 1.0
siege_equipment_available = ["sappers_tunnel"]
terrain_allows_tunneling = true

[tactics.effects]
siege_duration_multiplier = 1.5
casualty_rate_multiplier = 0.5
wall_bypass_chance = 0.6
