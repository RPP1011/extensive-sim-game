[[tactics]]
id = "feint_and_flank"
name = "Feint and Flank"
side = "attacker"
category = "deception"

[tactics.requirements]
min_army_ratio = 1.5
commander_level_min = 20
multiple_approach_routes = true

[tactics.effects]
siege_duration_multiplier = 0.8
casualty_rate_multiplier = 0.7
defender_repositioning_penalty = 0.4
