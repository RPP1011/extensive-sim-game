[[named_fortifications]]
id = "the_adamantine_keep"
name = "The Adamantine Keep"
effective_level = 85
wall_hp = 25000
height = 12.0
thickness = 6.0
description = "Dwarven-forged adamantine alloy bonded to granite. The metal doesn't rust, doesn't scratch, doesn't yield. Mining picks shatter against it. Spells slide off like water. The dwarves who built it consider it their finest work, and they don't say that lightly. It cost more than some kingdoms are worth."
lore = "A [Siege Engineer] examined the wall for a week. His report was one sentence: 'Find another way in.'"

