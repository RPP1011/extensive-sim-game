[[named_fortifications]]
id = "stormwatch_ramparts"
name = "Stormwatch Ramparts"
effective_level = 70
wall_hp = 12000
height = 10.0
thickness = 5.0
description = "Built on a cliff overlooking the sea, the ramparts crackle with captured lightning. Storm clouds gather above the walls even on clear days. Siege engines brought within range are struck by bolts from the sky — not random lightning, but aimed strikes that find the tallest wooden structure and reduce it to splinters."
lore = "Three trebuchets. That's how many the last army brought. The first was struck before it was assembled. The second fired once. The third never made it off the supply wagon."

