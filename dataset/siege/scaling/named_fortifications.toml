[[named_fortifications]]
id = "the_dreaming_spire"
name = "The Dreaming Spire"
effective_level = 75
tower_hp = 6000
height = 30.0
garrison_slots = 5
description = "The tower exists partly in another plane. Attackers who approach it feel drowsy, confused, lost. Arrows fired at it sometimes pass through as if it weren't there. The [Archmage] who built it never explained how, and she hasn't been seen in two centuries. The tower remains, dreaming whatever towers dream."
lore = "The assault team climbed the tower for six hours. They ended up back at the bottom. None of them could explain how."

