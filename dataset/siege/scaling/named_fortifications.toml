[[named_fortifications]]
id = "the_bleeding_gate"
name = "The Bleeding Gate"
effective_level = 60
gate_hp = 5000
height = 6.0
thickness = 1.0
description = "The iron is stained red, and it is not rust. Those who touch the gate with hostile intent feel their strength drain away. Blood seeps from its surface when battle is near, as if it anticipates the violence. The [Necromancer] who forged it was executed, but no one has been able to destroy his work."
lore = "A [Knight] in full plate laid his hand on the gate to push it open. They found him an hour later, white as parchment, barely alive. The gate hadn't moved."

