[[named_fortifications]]
id = "the_whispering_walls"
name = "The Whispering Walls"
effective_level = 50
wall_hp = 8000
height = 6.0
thickness = 3.0
description = "The walls talk. Not loudly — a susurrus at the edge of hearing, a murmur that the garrison has learned to interpret. Approaching forces are detected miles away. Invisible creatures are revealed the moment they enter the wall's awareness. Tunnelers are heard before their picks strike stone."
lore = "The spy was the best in the kingdom. She crept past three sentry lines without a sound. The walls told the garrison her name, her mission, and the contents of her pockets."

