[[named_fortifications]]
id = "the_unbroken_wall"
name = "The Unbroken Wall"
effective_level = 90
wall_hp = 20000
height = 15.0
thickness = 8.0
self_repairing = true
repair_rate = 50
siege_damage_reflection = 0.3
description = "It has never fallen. Not to the Demon King's horde, not to the Golem Armies, not to the Dragonflights. Every siege that has been laid against it has broken, and the wall remains without a single crack in its stone. Scholars argue whether it is enchanted or simply that well-built. The [Builders] who raised it are dust, but their work endures."
lore = "The attackers brought a battering ram the size of a ship's mast. The wall broke the ram."

