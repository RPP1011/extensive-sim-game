[[named_fortifications]]
id = "the_sunken_aegis"
name = "The Sunken Aegis"
effective_level = 65
wall_hp = 15000
height = 3.0
thickness = 10.0
description = "More below ground than above, the Aegis is a fortress designed to be assaulted from all directions — including below. The walls extend twenty feet underground, lined with enchanted stone that vibrates when tunnelers approach. The surface portion is modest, almost inviting. The trap is everything you can't see."
lore = "The sappers broke through into what they thought was a basement. It was the first of nine kill rooms, each sealed by a portcullis they couldn't lift."

