[[named_fortifications]]
id = "the_silent_curtain"
name = "The Silent Curtain"
effective_level = 80
wall_hp = 3000
height = 0.0
thickness = 0.0
description = "Not a wall at all — a zone of absolute silence and nullification. No sound passes through it. No magic functions within it. No Skill activates. Fighters who enter it lose access to every class ability they have. A Level 70 [Blademaster] becomes a man with a sword. A Level 50 [Archmage] becomes someone in a robe. The effect extends fifty paces in every direction."
lore = "The army charged through it at full strength. On the other side, they were just people. The garrison, who had trained to fight without Skills, cut them apart."

