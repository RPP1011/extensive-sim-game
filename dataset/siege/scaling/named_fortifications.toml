[[named_fortifications]]
id = "the_oathbound_gate"
name = "The Oathbound Gate"
effective_level = 70
gate_hp = 8000
height = 8.0
thickness = 2.0
description = "The gate was sealed with an oath, not a lock. A [Paladin] of the highest order swore that it would not open to enemies of the realm, and the oath took hold in the iron itself. No force has been able to open it from outside. Battering rams rebound. Petards fail to detonate. The gate simply refuses to be breached by those it judges unworthy."
lore = "The [Rogue] picked the lock in thirty seconds. The gate remained shut. 'It's not locked,' he said, baffled. 'It just won't open.'"

