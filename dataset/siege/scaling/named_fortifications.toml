[[named_fortifications]]
id = "thornhold_bulwark"
name = "Thornhold Bulwark"
effective_level = 55
wall_hp = 10000
height = 8.0
thickness = 5.0
description = "A living wall grown by three generations of [Druids], each more powerful than the last. The thorns are iron-hard, the roots go down to bedrock, and the wall actively fights back. Climbers are grabbed and pulled in. Fire that touches it is smothered by green growth that seems to come from nowhere."
lore = "They set it on fire. It grew back overnight, and the new thorns were longer."

