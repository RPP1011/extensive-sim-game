[[wards]]
id = "basic_dampening"
name = "Dampening Ward"
description = "Reduces magical damage against the fortification. Common on stone walls in mage-heavy regions."
tier = 1
ward_level = 10
ward_hp = 500
ability_damage_reduction = 0.3
anti_magic_radius = 2.0
projectile_deflection = 0.0
