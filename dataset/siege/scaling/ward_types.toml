min_class_level = 0
lore = "No living enchanter could replicate this. The technique died with the age of heroes."

[[wards]]
id = "divine_protection"
name = "Divine Protection"
description = "A [Priest] of extraordinary level has blessed these walls. The divine protection turns aside not just spells but ill intent itself."
