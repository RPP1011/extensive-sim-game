description = "Survive your first crisis."
category = "crisis"
tier = "bronze"
hidden = false
repeatable = false

[achievements.trigger]
type = "CrisisResolved"
count = 1

[achievements.reward]
rl_bonus = 0.1
narrative = "The first crisis came and went. The guild still stands."

