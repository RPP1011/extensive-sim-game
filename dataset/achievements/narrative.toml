# Narrative achievements — story moments, flavor, and world-building

[[achievements]]
id = "backstory_complete"
name = "Origin Story"
description = "Complete an adventurer's backstory sequence."
category = "narrative"
tier = "bronze"
hidden = false
repeatable = false

[achievements.trigger]
type = "QuestComplete"
condition = "backstory_sequence"

[achievements.reward]
rl_bonus = 0.1
narrative = "Every adventurer has a past. Now you know theirs."

