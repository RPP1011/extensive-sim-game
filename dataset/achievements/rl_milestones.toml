# RL milestones — reward shaping achievements to encourage diverse play in training

[[achievements]]
id = "all_quest_types_attempted"
name = "Well-Rounded"
description = "Attempt all quest types: explore, combat, diplomatic, and economic."
category = "rl_milestones"
tier = "silver"
hidden = false
repeatable = false

[achievements.trigger]
type = "QuestComplete"
condition = "all_quest_types_attempted"

[achievements.reward]
rl_bonus = 0.5
narrative = "Explore, fight, talk, trade. A guild that does it all."

