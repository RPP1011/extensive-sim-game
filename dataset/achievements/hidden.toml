# Hidden achievements — easter eggs and surprises, all hidden until earned

[[achievements]]
id = "level_1_vs_20"
name = "David and Goliath"
description = "Win a fight with a party of all level 1 adventurers against a level 20+ enemy."
category = "hidden"
tier = "platinum"
hidden = true
repeatable = false

[achievements.trigger]
type = "CombatWon"
condition = "all_level_1_vs_level_20"

[achievements.reward]
rl_bonus = 1.0
narrative = "They had no business winning that fight. They won anyway."

