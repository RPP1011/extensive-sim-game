travel_speed_multiplier = 1.0
danger_level = 0.2
maintenance_cost = 5
trade_bonus = 0.1

[roads.narrative]
description = "Wagon ruts carved deep by years of merchant traffic. Muddy in rain, dusty in sun, but it gets you there."

[[roads]]
name = "King's Bridge"
type = "bridge"
travel_speed_multiplier = 1.2
