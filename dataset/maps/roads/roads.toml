travel_speed_multiplier = 0.6
danger_level = 0.3
maintenance_cost = 3
trade_bonus = 0.0

[roads.narrative]
description = "Shallow enough to wade in summer, deadly in spring floods. Locals know where to step."

[[roads]]
name = "Merchant Sea Lane"
type = "sea_route"
travel_speed_multiplier = 2.0
danger_level = 0.4
maintenance_cost = 0
trade_bonus = 0.3

[roads.narrative]
description = "The fastest way between coastal cities. Pirates are the toll collectors, and storms are the gatekeepers."

[[roads]]
name = "Smuggler's Passage"
type = "underground_passage"
travel_speed_multiplier = 0.6
danger_level = 0.5
maintenance_cost = 2
trade_bonus = 0.0

[roads.narrative]
description = "A hidden passage known only to those who need to move unseen. Cramped, dark, and off every map."

[[roads]]
name = "Wayfinder's Gate"
type = "ancient_portal"
travel_speed_multiplier = 10.0
danger_level = 0.3
