travel_speed_multiplier = 0.5
danger_level = 0.6
maintenance_cost = 8
trade_bonus = 0.05

[roads.narrative]
description = "A narrow ledge carved into the mountainside. Don't look down, and pray the weather holds."

[[roads]]
name = "Deep Tunnel"
type = "tunnel"
travel_speed_multiplier = 0.8
danger_level = 0.5
maintenance_cost = 12
trade_bonus = 0.1

[roads.narrative]
