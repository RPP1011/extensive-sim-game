[[options]]
label = "Mercenary Supplement (50g)"
description = "Hire mercenaries to bolster the ranks. Expensive but preserves guild members."

[[options.effects]]
type = "gold"
amount = -50.0

[[options.effects]]
type = "narrative"
text = "Sellswords arrive, hungry for coin and blood. The guild's own people stay safer."
