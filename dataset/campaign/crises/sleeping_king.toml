name = "The Sleeping King"
description = "An ancient king stirs in his barrow. His champions — legends in their own right — answer the call. Each one a crisis unto themselves. Together, they are an army."
crisis_type = "sleeping_king"
world_templates = []
trigger_threshold = 0.7
priority = 10
allow_simultaneous = true

[config]
type = "SleepingKing"
king_faction_name = "Iron Dominion"
# With 3-second turns: 6000 ticks = ~5 hours into the campaign
first_activation_ticks = 6000
# New champion every ~2.5 hours
activation_interval_ticks = 3000
power_formula = "quadratic"
# All 7 must arrive before war is declared — gives the guild time to intercept
war_threshold = 5

