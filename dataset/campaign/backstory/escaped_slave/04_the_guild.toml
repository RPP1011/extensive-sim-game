effects = [
    { type = "narrative", text = "The guild master nods. 'Earn your place. We'll see.' Fair enough. You've been earning things the hard way your whole life." },
]

[[options]]
label = "Demand Leadership"
description = "You didn't escape chains to take orders. You'll join — but you want a voice in how things are run."
pc_traits = [{ trait = "diplomat_born" }]
