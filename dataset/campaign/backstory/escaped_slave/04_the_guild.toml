prompt = "The adventurers' guild accepts anyone who can fight. No questions about your past, no papers required. Just a strong arm and the willingness to risk your life for gold. The guild master looks you up and down. 'You've got scars,' she says. 'Good. Means you survive things.'"

[[options]]
label = "Swear the Oath"
description = "Full membership. The guild becomes your family — the first one you've had in years."
