name = "The Choice"
world_template = "Frontier"
sequence = 3
default_option = 0
prompt = "Word spreads about what happened at your homestead. People start showing up. You realize you could build something here. But what?"

[[options]]
label = "A Shield for the Frontier"
description = "You'll protect people. Train fighters, patrol the roads, keep the border safe."
pc_traits = [{ trait = "protector" }]
effects = [
    { type = "reputation", amount = 5.0 },
    { type = "narrative", text = "You declared your purpose: to stand between the frontier and whatever threatens it." },
]

[options.goal]
name = "Shield of the Frontier"
description = "Hold all guild-controlled regions above 50 control."

[[options.goal.conditions]]
type = "RegionControl"
region_id = 0
min_control = 50.0

[[options]]
label = "A Trading Company"
description = "There's money to be made connecting settlements, running caravans, brokering deals."
pc_traits = [{ trait = "merchant_mind" }]
effects = [
    { type = "gold", amount = 40.0 },
    { type = "narrative", text = "You saw opportunity in the chaos. Every crisis is a market." },
]

[options.goal]
name = "Fortune Builder"
description = "Accumulate 500 gold while maintaining 60+ reputation."

[[options.goal.conditions]]
type = "Gold"
min_gold = 500.0

[[options.goal.conditions]]
type = "Reputation"
min_reputation = 60.0

[[options]]
label = "A Force for Unity"
description = "The frontier is divided. Someone needs to bring everyone together."
pc_traits = [{ trait = "diplomat_born" }]
effects = [
    { type = "faction_relation", faction_id = 0, delta = 10.0 },
    { type = "narrative", text = "You set out to do what no one thought possible: unite the frontier." },
]

[options.goal]
name = "United Frontier"
description = "Bring all factions to Friendly or Coalition status."

[[options.goal.conditions]]
type = "AllFactionsAllied"
