[[choice.options.effects]]
type = "reputation"
amount = 5.0

[[choice.options.effects]]
type = "narrative"
text = "The accusation is made in the town square. The rival guild master goes red and stammers excuses."

[[choice.options]]
label = "Change Routes Quietly"
description = "Avoid the ambush entirely. No confrontation, no drama."

[[choice.options.effects]]
type = "supplies"
amount = -5.0

[[choice.options.effects]]
type = "narrative"
text = "The expedition takes a different path. The rival guild sits in the woods all day, waiting for no one."
