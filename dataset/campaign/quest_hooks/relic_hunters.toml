[[choice.options]]
label = "Hire Them"
description = "Pay them to work under guild direction. You get priority on relics."

[[choice.options.effects]]
type = "gold"
amount = -30.0

[[choice.options.effects]]
type = "narrative"
text = "The relic hunters accept guild contracts. Professional but pricey."

[[choice.options]]
label = "Compete"
description = "Race them to the relics. First team there keeps everything."

[[choice.options.effects]]
type = "narrative"
text = "Two groups head for the same ruins. Only one gets the prize."
