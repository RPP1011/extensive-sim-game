# An adventurer threatens to leave the guild.

name = "Desertion Threat"
priority = 7
repeatable = true
cooldown_ticks = 6000

[trigger]
type = "AdventurerBond"
min_shared_quests = 1

[choice]
category = "character"
trigger = "hook"
prompt = "{adventurer1_name} has packed their bags and posted a resignation letter. Low pay, high danger, and not enough recognition. They're one of the guild's better fighters. Losing them would hurt."
deadline_secs = 60.0
default_option = 0

[[choice.options]]
label = "Offer a Raise (30g)"
description = "Match what they could earn elsewhere. Expensive, but retention beats recruitment."

[[choice.options.effects]]
type = "gold"
amount = -30.0

[[choice.options.effects]]
type = "narrative"
text = "A new contract is drawn up. {adventurer1_name} unpacks, grudgingly satisfied."

[[choice.options]]
label = "Promote Them"
description = "Give them a leadership role. More responsibility, same pay, but pride keeps people."

[[choice.options.effects]]
type = "reputation"
amount = 3.0

[[choice.options.effects]]
type = "narrative"
text = "{adventurer1_name} accepts the promotion with a surprised smile. Sometimes recognition matters more than gold."

[[choice.options]]
label = "Let Them Go"
description = "People leave. The guild survives. Wish them well and move on."

[[choice.options.effects]]
type = "reputation"
amount = -2.0

[[choice.options.effects]]
type = "narrative"
text = "{adventurer1_name} walks out the door. The guild hall feels a little emptier."
