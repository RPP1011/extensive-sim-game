[meta]
name = "Wall Jumpers — Adaptive Wall Height"
description = "Enemies that can jump walls. Tests whether oracle raises wall height, adds overhangs, or compensates with garrison. The defining scenario for reactive building intelligence."
tags = ["military", "raid", "wall_height", "garrison_vs_structure"]
matrix_cells = [
    { challenge = "military", decision = "wall_composition" },
    { challenge = "military", decision = "vertical_design" },
    { challenge = "unit_capability", decision = "wall_composition" },
    { challenge = "high_value_npc", decision = "placement" },
]

[seed]
template = "seeds/town_hill.toml"
# Override: weaker existing walls to force the decision
[[seed.buildings]]
building_type = "Wall"
count = 8
tier = 0

[[challenges]]
category = "military"
sub_type = "raid_wall_jumpers"
severity = [0.6, 0.9]
direction = "east"

[[challenges.enemies]]
type_name = "orc_jumper"
level_range = [4, 8]
count = [10, 20]
can_jump = true
jump_height = 4
can_climb = false

sim_ticks = 400
num_random_baselines = 8
