# EVAL SET — Level-Scaled × Renovation/Upgrade
# Wood-only hamlet growing into a stone village. Tests upgrade-vs-rebuild decisions,
# tech-gated materials, workforce-limited construction, scaling defenses.

[meta]
name = "Level Scaling — Hamlet to Village Upgrade"
description = "Small hamlet with wood palisade upgrading to stone village defenses. Limited workforce means oracle must prioritize what to upgrade first and when to tear down vs. reinforce."
tags = ["level_scaled", "upgrade", "tech_progression", "workforce", "eval"]
matrix_cells = [
    { challenge = "level_scaled", decision = "material_selection" },
    { challenge = "level_scaled", decision = "renovation_upgrade" },
    { challenge = "level_scaled", decision = "prioritization" },
    { challenge = "level_scaled", decision = "demolition" },
]

[seed]
template = "seeds/hamlet_flat.toml"
settlement_level = 1
population = [15, 25]
tech_tier = 1

# Just unlocked stone — have some but not much
[seed.stockpiles]
wood = [40, 60]
iron = [3, 8]
food = [30, 50]

# --- Layout: Small hamlet, wood palisade, room to grow ---
# Grid layout (16x16, flat terrain):
#   - Wood palisade (upgrading to stone is the challenge)
#   - 3 houses, well, storehouse, 2 farms
#   - Sparse — oracle needs to decide what to upgrade vs. demolish
#   - Threat from north — palisade needs strengthening there
[seed.layout]
grid_size = [16, 16]

# --- Wood palisade (to be upgraded to stone) ---
[[seed.layout.wall_circuits]]
waypoints = [[2, 2], [13, 2], [13, 13], [2, 13]]
material = "wood"
height = 2
thickness = 1

# --- Gates ---
[[seed.layout.gates]]
cell = [7, 2]
facing = "north"
width = 1

[[seed.layout.gates]]
cell = [7, 13]
facing = "south"
width = 1

# --- Houses (wood, upgrade candidates) ---
[[seed.layout.buildings]]
type = "House"
cell = [4, 4]
footprint = [2, 2]
material = "wood"

[[seed.layout.buildings]]
type = "House"
cell = [7, 4]
footprint = [2, 2]
material = "wood"

[[seed.layout.buildings]]
type = "House"
cell = [10, 4]
footprint = [2, 2]
material = "wood"

# --- Central well ---
[[seed.layout.buildings]]
type = "Well"
cell = [7, 7]
footprint = [1, 1]

# --- Farms ---
[[seed.layout.buildings]]
type = "Farm"
cell = [3, 8]
footprint = [3, 3]

[[seed.layout.buildings]]
type = "Farm"
cell = [8, 8]
footprint = [3, 3]

# --- Storehouse (wood, upgrade candidate) ---
[[seed.layout.buildings]]
type = "Warehouse"
cell = [5, 11]
footprint = [3, 2]
material = "wood"

# --- Roads ---
# Main road: north gate → center → south gate
[[seed.layout.roads]]
waypoints = [[7, 2], [7, 7], [7, 13]]

# --- Zones ---
[[seed.layout.zones]]
zone = "residential"
from = [3, 3]
to = [12, 6]

[[seed.layout.zones]]
zone = "agricultural"
from = [2, 7]
to = [11, 11]

# Small workforce
[[seed.npcs]]
class = "laborer"
level = [1, 3]
count = 4

[[seed.npcs]]
class = "mason"
level = [2, 4]
count = 1

[[seed.npcs]]
class = "warrior"
level = [2, 4]
count = 2
is_garrison = true

[[challenges]]
category = "level_scaled"
sub_type = "settlement_upgrade"
severity = [0.4, 0.6]

# Mild threat to motivate defense upgrade
[[challenges]]
category = "military"
sub_type = "raid"
severity = [0.3, 0.4]
direction = "north"

[[challenges.enemies]]
profile = "enemy_profiles/bandits.toml"
count = [5, 8]

sim_ticks = 500
num_random_baselines = 5
