# EVAL SET — Terrain/Geography × Military
# Hillside settlement attacked from the south (low ground).
# Oracle should exploit elevation advantage, fortify the slope approach,
# and place archers on high ground.
#
# Grid layout (24x24, north=top):
#   - High ground (north): residential, market, leader manor
#   - Mid slope: barracks, forge, warehouse
#   - Low ground (south): farms, approach from enemy
#   - Stone wall circuit on the south/east/west (north is cliff)
#   - Two gates: south main gate, west trade gate

[meta]
name = "Terrain Exploitation — Hillside Raid"
description = "Hillside village raided from the low ground. Oracle must leverage elevation for defense rather than building flat-terrain walls."
tags = ["terrain", "hillside", "elevation_advantage", "eval"]
matrix_cells = [
    { challenge = "terrain", decision = "placement" },
    { challenge = "terrain", decision = "foundation" },
    { challenge = "terrain", decision = "vertical_design" },
    { challenge = "military", decision = "wall_composition" },
]

[seed]
template = "seeds/town_hill.toml"
settlement_level = 2
tech_tier = 2

[seed.stockpiles]
wood = [20, 35]
iron = [5, 15]
food = [40, 60]

[seed.layout]
grid_size = [24, 24]

# --- Wall circuit: encloses settlement, cliff is open high ground above ---
# Rows 0-3: cliff / high ground (empty — oracle should place ranged units here)
# Rows 4-20: walled settlement
[[seed.layout.wall_circuits]]
waypoints = [[3, 4], [20, 4], [20, 20], [3, 20]]
material = "stone"
height = 4
thickness = 1

# --- Gates ---
[[seed.layout.gates]]
cell = [11, 20]
facing = "south"
width = 2

[[seed.layout.gates]]
cell = [3, 12]
facing = "west"
width = 1

