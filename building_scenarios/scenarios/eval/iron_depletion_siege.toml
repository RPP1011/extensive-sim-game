# EVAL SET — Economic × Material Selection/Prioritization
# Iron depleted mid-construction with siege incoming. Tests resource substitution,
# material downgrade decisions, garrison compensation for structural weakness.

[meta]
name = "Resource Crisis — Iron Depletion Under Siege"
description = "Iron stockpile depleted with siege approaching. Oracle must substitute materials, prioritize wood/stone alternatives, and lean on garrison where structural defense falls short."
tags = ["economic", "resource_depletion", "material_substitution", "garrison_compensation", "eval"]
matrix_cells = [
    { challenge = "economic", decision = "material_selection" },
    { challenge = "economic", decision = "prioritization" },
    { challenge = "military", decision = "wall_composition" },
    { challenge = "economic", decision = "placement" },
]

[seed]
template = "seeds/village_river.toml"
settlement_level = 2
tech_tier = 2

# Iron is gone, wood/stone available
[seed.stockpiles]
wood = [25, 40]
iron = [0, 1]
food = [30, 50]

# --- Layout: River village, siege from east, no iron for reinforcement ---
# Grid layout (24x24):
#   - River along south edge (rows 20-23, natural barrier)
#   - Settlement north of river
#   - East wall needs reinforcement but iron depleted
#   - Oracle must substitute wood/stone, lean on garrison for east defense
#   - Key test: material substitution under resource pressure
[seed.layout]
grid_size = [24, 24]

# --- Stone wall circuit (east side vulnerable) ---
[[seed.layout.wall_circuits]]
waypoints = [[2, 1], [19, 1], [19, 18], [2, 18]]
material = "stone"
height = 3
thickness = 1

# --- Gates ---
[[seed.layout.gates]]
