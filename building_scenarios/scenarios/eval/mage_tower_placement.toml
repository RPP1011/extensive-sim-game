# EVAL SET — Unit Capability × Class-Specific Infrastructure
# Settlement with mages and archers needs class-specific buildings.
# Tests mage tower placement (spell range coverage), archer platform sizing,
# training yard near threat, garrison capacity planning.

[meta]
name = "Unit Infrastructure — Mage Tower & Archer Platforms"
description = "Settlement with mixed ranged garrison needs class-specific infrastructure. Oracle should place mage tower for maximum spell coverage and archer platforms at optimal engagement range."
tags = ["unit_capability", "class_infrastructure", "mage_tower", "archer_platform", "eval"]
matrix_cells = [
    { challenge = "unit_capability", decision = "placement" },
    { challenge = "unit_capability", decision = "vertical_design" },
    { challenge = "unit_capability", decision = "footprint_geometry" },
    { challenge = "unit_capability", decision = "openings" },
]

[seed]
template = "seeds/town_hill.toml"
settlement_level = 3
tech_tier = 2

[seed.stockpiles]
wood = [20, 35]
iron = [10, 20]
food = [40, 60]

# --- Layout: Hill town, threat from west, ranged garrison ---
# Grid layout (24x24, north=high ground):
#   - Elevation rises west→east (high ground east)
#   - Threat from west (low approach)
#   - Mage tower should go on high ground for max spell range
#   - Archer platforms along west wall at engagement range
#   - Warriors at west gate
#   - Key test: class-specific placement exploiting terrain
[seed.layout]
grid_size = [24, 24]

# --- Stone wall circuit ---
[[seed.layout.wall_circuits]]
waypoints = [[3, 1], [20, 1], [20, 19], [3, 19]]
material = "stone"
height = 4
thickness = 1

# --- Gates ---
[[seed.layout.gates]]
cell = [3, 10]
facing = "west"
width = 2

[[seed.layout.gates]]
cell = [12, 19]
facing = "south"
width = 1

# --- Civic (east / high ground) ---
[[seed.layout.buildings]]
type = "Manor"
cell = [14, 2]
footprint = [3, 3]
material = "stone"
facing = "west"

[[seed.layout.buildings]]
type = "Temple"
cell = [18, 2]
footprint = [2, 3]
material = "stone"

[[seed.layout.buildings]]
type = "Market"
cell = [10, 3]
footprint = [3, 2]

# --- Residential (center) ---
