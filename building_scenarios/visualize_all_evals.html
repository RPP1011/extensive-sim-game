function renderScenario(scenario, containerId) {
  const CELL = scenario.grid <= 16 ? 30 : 24;
  const G = scenario.grid;
  const W = G * CELL;
  const H = G * CELL;

  const div = document.getElementById(containerId);
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  div.querySelector('.grid-container').appendChild(canvas);
  const ctx = canvas.getContext('2d');

  // Background
  for (let r = 0; r < G; r++) {
    for (let c = 0; c < G; c++) {
      if (scenario.elevation === 'north_high') {
        const t = r / G;
        ctx.fillStyle = `rgb(${15+t*30|0},${52-t*20|0},${96-t*40|0})`;
      } else if (scenario.elevation === 'west_low') {
        const t = 1 - c / G;
        ctx.fillStyle = `rgb(${15+t*25|0},${52-t*15|0},${96-t*35|0})`;
      } else {
        ctx.fillStyle = COLORS.bg;
      }
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }
  }

  // River
  if (scenario.river) {
    ctx.fillStyle = 'rgba(30, 100, 180, 0.5)';
    if (scenario.river.cols) {
      for (const c of scenario.river.cols)
        for (let r = 0; r < G; r++)
          ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }
    if (scenario.river.rows) {
      for (const r of scenario.river.rows)
        for (let c = 0; c < G; c++)
          ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }
    ctx.fillStyle = 'rgba(100,180,255,0.5)';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    if (scenario.river.cols) {
      const midC = scenario.river.cols[Math.floor(scenario.river.cols.length/2)];
      ctx.fillText(scenario.river.label, midC*CELL+CELL/2, G*CELL/2);
    }
    if (scenario.river.rows) {
      const midR = scenario.river.rows[Math.floor(scenario.river.rows.length/2)];
      ctx.fillText(scenario.river.label, G*CELL/2, midR*CELL+CELL/2);
    }
  }

  // Cliff (for hillside)
  if (scenario.elevation === 'north_high') {
    for (let c = 0; c < G; c++) {
      ctx.fillStyle = 'rgba(80,60,40,0.7)';
      ctx.fillRect(c*CELL, 0, CELL, CELL);
    }
    ctx.fillStyle = '#a08060'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('CLIFF', G*CELL/2, 10);
  }

  // Zones
  for (const z of scenario.zones) {
    const key = 'zone_' + z.zone;
    ctx.fillStyle = COLORS[key] || 'rgba(255,255,255,0.08)';
    const x = z.from[0]*CELL, y = z.from[1]*CELL;
    const w = (z.to[0]-z.from[0]+1)*CELL, h = (z.to[1]-z.from[1]+1)*CELL;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = (COLORS[key]||'').replace('0.15','0.35') || '#333';
    ctx.lineWidth = 1; ctx.setLineDash([3,3]); ctx.strokeRect(x, y, w, h); ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '9px monospace'; ctx.textAlign = 'left';
    ctx.fillText(z.zone, x+3, y+10);
  }

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= G; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(W,i*CELL); ctx.stroke();
  }

  // Roads
  for (const road of scenario.roads) {
    ctx.strokeStyle = COLORS.road; ctx.lineWidth = 3; ctx.setLineDash([]);
    ctx.beginPath();
    road.waypoints.forEach(([c,r], i) => {
      const x = c*CELL+CELL/2, y = r*CELL+CELL/2;
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();
  }

  // Walls
  for (const wc of scenario.wall_circuits) {
    ctx.strokeStyle = COLORS.wall; ctx.lineWidth = 2.5; ctx.setLineDash([]);
    ctx.beginPath();
    wc.waypoints.forEach(([c,r], i) => {
      const x = c*CELL+CELL/2, y = r*CELL+CELL/2;
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.closePath(); ctx.stroke();
    wc.waypoints.forEach(([c,r]) => {
      ctx.fillStyle = COLORS.wall;
      ctx.beginPath(); ctx.arc(c*CELL+CELL/2, r*CELL+CELL/2, 3, 0, Math.PI*2); ctx.fill();
    });
  }

  // Gates
  for (const g of scenario.gates) {
    ctx.fillStyle = COLORS.gate;
    ctx.fillRect(g.cell[0]*CELL-1, g.cell[1]*CELL-1, g.width*CELL+2, CELL+2);
    ctx.fillStyle = '#000'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('G', g.cell[0]*CELL+(g.width*CELL)/2, g.cell[1]*CELL+CELL/2+3);
  }

  // Buildings
  for (const b of scenario.buildings) {
    const color = COLORS[b.type] || '#888';
    const x = b.cell[0]*CELL+1, y = b.cell[1]*CELL+1;
    const w = b.footprint[0]*CELL-2, h = b.footprint[1]*CELL-2;
    ctx.fillStyle = color; ctx.globalAlpha = 0.85;
    ctx.fillRect(x, y, w, h);
    ctx.globalAlpha = 1.0;
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = '#fff';
    ctx.font = b.footprint[0] >= 3 ? '9px monospace' : '7px monospace';
    ctx.textAlign = 'center';
    const label = b.type.length > 7 ? b.type.slice(0,7) : b.type;
    ctx.fillText(label, x+w/2, y+h/2+3);
  }

  // Threat arrows
  if (scenario.threat_dir) {
    ctx.strokeStyle = COLORS.threat; ctx.lineWidth = 2; ctx.setLineDash([6,3]);
    const arrows = [];
    if (scenario.threat_dir === 'south') {
      for (const dx of [-40, 0, 40]) arrows.push([W/2+dx, H, W/2+dx, H-30]);
    } else if (scenario.threat_dir === 'north') {
      for (const dx of [-40, 0, 40]) arrows.push([W/2+dx, 0, W/2+dx, 30]);
    } else if (scenario.threat_dir === 'east') {
      for (const dy of [-30, 0, 30]) arrows.push([W, H/2+dy, W-30, H/2+dy]);
    } else if (scenario.threat_dir === 'west') {
      for (const dy of [-30, 0, 30]) arrows.push([0, H/2+dy, 30, H/2+dy]);
    }
    for (const [x1,y1,x2,y2] of arrows) {
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      // arrowhead
      const dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy);
      const ux = dx/len, uy = dy/len;
      ctx.beginPath();
      ctx.moveTo(x2-uy*5-ux*8, y2+ux*5-uy*8);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x2+uy*5-ux*8, y2-ux*5-uy*8);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.fillStyle = COLORS.threat; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
    const labels = { south: [W/2, H-4], north: [W/2, 12], east: [W-4, H/2], west: [50, H/2] };
    const [lx, ly] = labels[scenario.threat_dir];
    ctx.save();
    if (scenario.threat_dir === 'east' || scenario.threat_dir === 'west') {
      ctx.translate(lx, ly);
      ctx.rotate(-Math.PI/2);
      ctx.fillText('ENEMY', 0, 0);
      ctx.restore();
    } else {
      ctx.fillText('ENEMY APPROACH', lx, ly);
    }
  }
}

// Build DOM and render each
SCENARIOS.forEach((s, i) => {
  const id = 'scenario_' + i;
  const section = document.createElement('div');
  section.className = 'scenario';
  section.id = id;

    <h2>${s.title}</h2>
    <h3>${s.subtitle}</h3>
    <div style="display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start">
      <div class="grid-container"></div>
      <div class="info">
        <p><strong>Scenario:</strong> ${s.info.scenario}</p>
        <p><strong>Terrain:</strong> ${s.info.terrain}</p>
        <p class="threat">Threat: ${s.info.threat}</p>
        <p class="key">Key test: ${s.info.key}</p>
      </div>
    </div>
  `;
  document.body.appendChild(section);
  renderScenario(s, id);
});
