<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Concept Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #13161d;
  --surface2: #1c2029;
  --surface3: #252a36;
  --border: #2a2f3e;
  --border-bright: #3d4459;
  --text: #b8c0cc;
  --text-muted: #6b7280;
  --heading: #e2e8f0;
  --accent: #60a5fa;
  --accent-dim: #2563eb;
  --purple: #a78bfa;
  --purple-dim: #7c3aed;
  --green: #34d399;
  --green-dim: #059669;
  --red: #f87171;
  --red-dim: #dc2626;
  --orange: #fbbf24;
  --orange-dim: #d97706;
  --cyan: #22d3ee;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Source Serif 4', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.78;
  font-size: 17px;
  -webkit-font-smoothing: antialiased;
}

.article {
  max-width: 1100px;
  margin: 0 auto;
  padding: 3rem 1rem 6rem;
}

a.back-link {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  color: var(--accent);
  text-decoration: none;
  display: inline-block;
  margin-bottom: 1.5rem;
  opacity: 0.7;
  transition: opacity 0.2s;
}
a.back-link:hover { opacity: 1; }
a.back-link::before { content: "\2190\00a0"; }

h1 {
  font-family: 'DM Sans', sans-serif;
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--heading);
  line-height: 1.2;
  margin-bottom: 0.6rem;
  letter-spacing: -0.03em;
}

.subtitle {
  font-size: 1rem;
  color: var(--text-muted);
  margin-bottom: 2rem;
  line-height: 1.65;
}

#dag-container {
  width: 100%;
  overflow-x: auto;
  margin-bottom: 2rem;
}

#dag-container svg {
  display: block;
  margin: 0 auto;
}

.group-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  fill: var(--text-muted);
}

.node-rect {
  rx: 6;
  ry: 6;
  cursor: pointer;
  transition: filter 0.2s;
}
.node-rect:hover {
  filter: brightness(1.3);
}

.node-text {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  fill: var(--heading);
  pointer-events: none;
  text-anchor: middle;
  dominant-baseline: central;
}

.edge {
  fill: none;
  stroke-width: 1.5;
  stroke-dasharray: 6 4;
  opacity: 0.25;
}

.edge-arrow {
  opacity: 0.25;
}

.footer-note {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  color: var(--text-muted);
  text-align: center;
  margin-top: 1rem;
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="article">
  <a class="back-link" href="../index.html">Back to index</a>
  <h1>ML Concept Map</h1>
  <p class="subtitle">A prerequisite guide for the IMPALA V4 training pipeline. Follow the arrows from top to bottom for a guided learning path through the core ML concepts used in this project.</p>
  <div id="dag-container"></div>
  <p class="footer-note">Click any node to jump to that section. Follow the arrows for a guided learning path.</p>
</div>

<script>
(function() {
  // --- Data ---
  const groups = [
    {
      id: "foundations",
      label: "Foundations",
      color: "#22d3ee",     // cyan
      colorDim: "#0e7490",
      nodes: [
        { label: "Neural Networks",   href: "concepts_foundations.html#neural-networks" },
        { label: "Gradient Descent",  href: "concepts_foundations.html#gradient-descent" },
        { label: "Loss Functions",    href: "concepts_foundations.html#loss-functions" },
      ]
    },
    {
      id: "training",
      label: "Training",
      color: "#34d399",     // green
      colorDim: "#059669",
      nodes: [
        { label: "Batch / Epoch / LR",       href: "concepts_foundations.html#batch-epoch-lr" },
        { label: "Overfitting & Generalization", href: "concepts_foundations.html#overfitting" },
        { label: "Normalization",             href: "concepts_foundations.html#normalization" },
      ]
    },
    {
      id: "math_basics",
      label: "Math (Basics)",
      color: "#a78bfa",     // purple
      colorDim: "#7c3aed",
      nodes: [
        { label: "Probability Distribution", href: "concepts_math.html#probability" },
        { label: "Expectation",              href: "concepts_math.html#expectation" },
        { label: "Log Probability",          href: "concepts_math.html#log-probability" },
        { label: "Sampling",                 href: "concepts_math.html#sampling" },
      ]
    },
    {
      id: "math_info",
      label: "Math (Info Theory)",
      color: "#a78bfa",
      colorDim: "#7c3aed",
      nodes: [
        { label: "Entropy",                href: "concepts_math.html#entropy" },
        { label: "KL Divergence",          href: "concepts_math.html#kl-divergence" },
        { label: "Variance",               href: "concepts_math.html#variance" },
        { label: "Bias-Variance Tradeoff", href: "concepts_math.html#bias-variance" },
      ]
    },
    {
      id: "math_tools",
      label: "Math (Tools)",
      color: "#a78bfa",
      colorDim: "#7c3aed",
      nodes: [
        { label: "Dot Product",            href: "concepts_math.html#dot-product" },
        { label: "Matrix Multiply",        href: "concepts_math.html#matrix-multiply" },
        { label: "Cosine Similarity",      href: "concepts_math.html#cosine-similarity" },
        { label: "Exponential Moving Avg", href: "concepts_math.html#ema" },
      ]
    },
    {
      id: "architecture",
      label: "Architecture",
      color: "#60a5fa",     // blue/accent
      colorDim: "#2563eb",
      nodes: [
        { label: "Tokenization",         href: "concepts_architecture.html#tokenization" },
        { label: "Residual Connections",  href: "concepts_architecture.html#residual-connections" },
        { label: "Autoencoder",           href: "concepts_architecture.html#autoencoder" },
        { label: "Latent Spaces",         href: "concepts_architecture.html#latent-spaces" },
      ]
    },
    {
      id: "attention",
      label: "Attention",
      color: "#fbbf24",     // orange
      colorDim: "#d97706",
      nodes: [
        { label: "Attention (Overview)", href: "concepts_attention.html#attention" },
        { label: "Logits & Softmax",     href: "concepts_attention.html#logits-softmax" },
        { label: "Scaled Dot-Product",   href: "concepts_attention.html#scaled-dot-product" },
      ]
    },
    {
      id: "attention2",
      label: "Attention (contd.)",
      color: "#fbbf24",
      colorDim: "#d97706",
      nodes: [
        { label: "Self-Attention",           href: "concepts_attention.html#self-attention" },
        { label: "Cross-Attention",          href: "concepts_attention.html#cross-attention" },
        { label: "Masked Language Modeling", href: "concepts_attention.html#masked-lm" },
      ]
    },
    {
      id: "rl_foundations",
      label: "RL Foundations",
      color: "#f87171",     // red
      colorDim: "#dc2626",
      nodes: [
        { label: "Actor-Critic",          href: "concepts_rl_foundations.html#actor-critic" },
        { label: "Value & Q-Functions",   href: "concepts_rl_foundations.html#value-q-functions" },
        { label: "Reward Shaping",        href: "concepts_rl_foundations.html#reward-shaping" },
        { label: "On-Policy vs Off-Policy", href: "concepts_rl_foundations.html#on-off-policy" },
        { label: "Replay Buffer",         href: "concepts_rl_foundations.html#replay-buffer" },
      ]
    },
    {
      id: "rl_algorithms",
      label: "RL Algorithms",
      color: "#f87171",
      colorDim: "#dc2626",
      nodes: [
        { label: "REINFORCE",       href: "concepts_rl_algorithms.html#reinforce" },
        { label: "PPO",             href: "concepts_rl_algorithms.html#ppo" },
        { label: "IMPALA & V-Trace", href: "concepts_rl_algorithms.html#impala" },
        { label: "SAC",             href: "concepts_rl_algorithms.html#sac" },
      ]
    },
  ];

  // Edges: simple spine connecting each row to the next (no crossings)
  const edges = [
    { from: "foundations",    to: "training" },
    { from: "training",       to: "math_basics" },
    { from: "math_basics",    to: "math_info" },
    { from: "math_info",      to: "math_tools" },
    { from: "math_tools",     to: "architecture" },
    { from: "architecture",   to: "attention" },
    { from: "attention",      to: "attention2" },
    { from: "attention2",     to: "rl_foundations" },
    { from: "rl_foundations", to: "rl_algorithms" },
  ];

  // --- Layout constants ---
  const nodeW = 160;
  const nodeH = 34;
  const nodeGap = 14;
  const rowGap = 70;
  const labelColW = 140;
  const padLeft = 16;
  const padTop = 30;
  const padRight = 16;
  const padBottom = 20;

  // Compute row positions and node positions
  const groupMeta = {};
  let y = padTop;
  groups.forEach(g => {
    const totalW = g.nodes.length * nodeW + (g.nodes.length - 1) * nodeGap;
    groupMeta[g.id] = { y: y, totalW: totalW, nodes: [] };
    g.nodes.forEach((n, i) => {
      const nx = labelColW + padLeft + i * (nodeW + nodeGap);
      groupMeta[g.id].nodes.push({ x: nx, y: y, w: nodeW, h: nodeH, ...n, groupId: g.id, color: g.color, colorDim: g.colorDim });
    });
    y += nodeH + rowGap;
  });

  const maxNodesInRow = Math.max(...groups.map(g => g.nodes.length));
  const svgW = labelColW + padLeft + maxNodesInRow * nodeW + (maxNodesInRow - 1) * nodeGap + padRight;
  const svgH = y - rowGap + nodeH + padBottom;

  // --- Render ---
  const svg = d3.select("#dag-container")
    .append("svg")
    .attr("width", svgW)
    .attr("height", svgH)
    .attr("viewBox", `0 0 ${svgW} ${svgH}`);

  // Arrowhead marker
  svg.append("defs").append("marker")
    .attr("id", "arrowhead")
    .attr("viewBox", "0 0 10 7")
    .attr("refX", 10)
    .attr("refY", 3.5)
    .attr("markerWidth", 8)
    .attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("polygon")
    .attr("points", "0 0, 10 3.5, 0 7")
    .attr("fill", "#6b7280")
    .attr("class", "edge-arrow");

  // Draw edges (between group centers)
  const edgeGroup = svg.append("g");
  edges.forEach(e => {
    const srcMeta = groupMeta[e.from];
    const tgtMeta = groupMeta[e.to];
    const srcGroup = groups.find(g => g.id === e.from);
    const tgtGroup = groups.find(g => g.id === e.to);

    // Source: bottom-center of first node in source row
    const srcCx = labelColW + padLeft + nodeW / 2;
    const srcY = srcMeta.y + nodeH;

    // Target: top-center of first node in target row
    const tgtCx = labelColW + padLeft + nodeW / 2;
    const tgtY = tgtMeta.y;

    // Blend color from source group
    const edgeColor = srcGroup.color;

    const midY = (srcY + tgtY) / 2;

    const path = d3.path();
    path.moveTo(srcCx, srcY);
    path.bezierCurveTo(srcCx, midY, tgtCx, midY, tgtCx, tgtY);

    edgeGroup.append("path")
      .attr("d", path.toString())
      .attr("class", "edge")
      .attr("stroke", edgeColor)
      .attr("marker-end", "url(#arrowhead)");
  });

  // Draw group labels and nodes
  groups.forEach(g => {
    const meta = groupMeta[g.id];

    // Group label on the left
    svg.append("text")
      .attr("x", padLeft)
      .attr("y", meta.y + nodeH / 2)
      .attr("class", "group-label")
      .attr("fill", g.color)
      .attr("dominant-baseline", "central")
      .text(g.label);

    // Nodes
    meta.nodes.forEach(n => {
      const nodeG = svg.append("a")
        .attr("href", n.href);

      nodeG.append("rect")
        .attr("class", "node-rect")
        .attr("x", n.x)
        .attr("y", n.y)
        .attr("width", n.w)
        .attr("height", n.h)
        .attr("fill", n.colorDim)
        .attr("fill-opacity", 0.18)
        .attr("stroke", n.color)
        .attr("stroke-opacity", 0.45)
        .attr("stroke-width", 1);

      nodeG.append("text")
        .attr("class", "node-text")
        .attr("x", n.x + n.w / 2)
        .attr("y", n.y + n.h / 2)
        .text(n.label);
    });
  });

})();
</script>
</body>
</html>
