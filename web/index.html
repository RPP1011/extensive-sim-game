<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Simulation — Cartographer's View</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&family=Cinzel:wght@400;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0a0908;
  --bg-panel: #13110f;
  --bg-card: #1a1714;
  --bg-hover: #231f1a;
  --border: #2a2520;
  --border-light: #3a3530;
  --text-primary: #d4c5a9;
  --text-secondary: #8a7e6b;
  --text-muted: #5a5245;
  --text-bright: #f0e6d0;
  --accent-gold: #c9a84c;
  --accent-gold-dim: #7a6a30;
  --accent-red: #b44;
  --accent-blue: #4a7ab4;
  --accent-green: #4a8a4a;
  --accent-purple: #8a5ab4;
  --season-spring: rgba(120, 160, 80, 0.06);
  --season-summer: rgba(80, 140, 60, 0.08);
  --season-autumn: rgba(180, 120, 40, 0.07);
  --season-winter: rgba(100, 140, 180, 0.06);
  --font-display: 'Cinzel', serif;
  --font-body: 'Cormorant Garamond', serif;
  --font-mono: 'JetBrains Mono', monospace;
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 15px;
  overflow: hidden;
  cursor: default;
}

/* ============================================================
   LAYOUT — CSS Grid
   ============================================================ */
#app {
  display: grid;
  grid-template-columns: 240px 1fr 280px;
  grid-template-rows: 48px 1fr 80px;
  grid-template-areas:
    "header  header   header"
    "factions map     chronicle"
    "timeline timeline timeline";
  height: 100vh;
  width: 100vw;
}

/* ============================================================
   HEADER
   ============================================================ */
#header {
  grid-area: header;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}

#header h1 {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent-gold);
  text-shadow: 0 0 20px rgba(201, 168, 76, 0.2);
}

.header-info {
  display: flex;
  gap: 24px;
  align-items: center;
}

.header-stat {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 300;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}
.header-stat span {
  color: var(--text-bright);
  font-weight: 500;
}

.season-badge {
  padding: 3px 12px;
  border-radius: 2px;
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.6s ease;
}
.season-Spring { background: rgba(120,160,80,0.15); color: #a0c060; border: 1px solid rgba(120,160,80,0.3); }
.season-Summer { background: rgba(80,140,60,0.15); color: #80b840; border: 1px solid rgba(80,140,60,0.3); }
.season-Autumn { background: rgba(180,120,40,0.15); color: #c09040; border: 1px solid rgba(180,120,40,0.3); }
.season-Winter { background: rgba(100,140,180,0.15); color: #80a8c0; border: 1px solid rgba(100,140,180,0.3); }

/* ============================================================
   HEATMAP TOOLBAR
   ============================================================ */
.heatmap-toolbar {
  display: flex;
  gap: 4px;
}
.heatmap-btn {
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.heatmap-btn:hover { color: var(--text-secondary); border-color: var(--border-light); }
.heatmap-btn.active { color: var(--text-bright); border-color: var(--accent-gold-dim); background: rgba(201,168,76,0.08); }
.heatmap-btn.threat.active { border-color: var(--accent-red); color: #d88; background: rgba(180,68,68,0.1); }
.heatmap-btn.food.active { border-color: var(--accent-green); color: #8c8; background: rgba(74,138,74,0.1); }
.heatmap-btn.pop.active { border-color: var(--accent-blue); color: #8ac; background: rgba(74,122,180,0.1); }
.heatmap-btn.trade.active { border-color: var(--accent-gold); color: #ca8; background: rgba(201,168,76,0.1); }

/* ============================================================
   FACTION PANEL (left)
   ============================================================ */
#factions {
  grid-area: factions;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px;
}

.panel-title {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.faction-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px;
  margin-bottom: 8px;
  transition: border-color 0.2s;
}
.faction-card:hover { border-color: var(--border-light); }

.faction-name {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.faction-swatch {
  width: 10px; height: 10px;
  border-radius: 1px;
  box-shadow: 0 0 6px rgba(var(--sw-r), var(--sw-g), var(--sw-b), 0.4);
}
.faction-detail {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-secondary);
  line-height: 1.6;
}
.faction-bar {
  height: 3px;
  background: var(--border);
  border-radius: 1px;
  margin-top: 4px;
  overflow: hidden;
}
.faction-bar-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.4s ease;
}

/* ============================================================
   MAP VIEWPORT (center)
   ============================================================ */
#map {
  grid-area: map;
  position: relative;
  overflow: hidden;
  cursor: grab;
  transition: background-color 0.8s ease;
}
#map:active { cursor: grabbing; }
#map canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

/* Detail panel overlay */
#detail-panel {
  position: absolute;
  top: 12px; left: 12px;
  width: 320px;
  max-height: calc(100% - 24px);
  background: rgba(19, 17, 15, 0.95);
  border: 1px solid var(--border-light);
  border-radius: 4px;
  padding: 16px;
  overflow-y: auto;
  display: none;
  z-index: 50;
  backdrop-filter: blur(8px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#detail-panel.visible { display: block; animation: slideIn 0.2s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }

.detail-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 4px;
  letter-spacing: 1px;
}
.detail-subtitle {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 12px;
  letter-spacing: 0.5px;
}
.detail-close {
  position: absolute;
  top: 12px; right: 12px;
  background: none; border: none;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  line-height: 1;
}
.detail-close:hover { color: var(--text-primary); }

.detail-section {
  margin-bottom: 12px;
}
.detail-section-title {
  font-family: var(--font-display);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.detail-text {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-secondary);
}
.detail-text em { color: var(--text-primary); font-style: italic; }

.stockpile-bar {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-secondary);
}
.stockpile-bar-label { width: 50px; text-align: right; }
.stockpile-bar-track {
  flex: 1; height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.stockpile-bar-fill { height: 100%; border-radius: 2px; }
.stockpile-bar-val { width: 40px; font-size: 9px; }

/* Emotion radar (canvas) */
.emotion-radar { margin: 8px auto; display: block; }

/* Tag cloud */
.tag-cloud { display: flex; flex-wrap: wrap; gap: 4px; }
.tag-pill {
  padding: 2px 8px;
  border-radius: 2px;
  font-family: var(--font-mono);
  font-size: 9px;
  background: var(--bg-hover);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

/* Threat gauge */
.threat-gauge {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
}
.threat-gauge-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s, background-color 0.4s;
}

/* ============================================================
   CHRONICLE FEED (right)
   ============================================================ */
#chronicle {
  grid-area: chronicle;
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chronicle-header {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}

.chronicle-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}
.filter-chip {
  padding: 2px 6px;
  border: 1px solid var(--border);
  border-radius: 2px;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  background: transparent;
  color: var(--text-muted);
}
.filter-chip.active { color: var(--text-primary); border-color: var(--border-light); background: var(--bg-hover); }
.filter-chip:hover { border-color: var(--border-light); }

#chronicle-log {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
}
#chronicle-log::-webkit-scrollbar { width: 4px; }
#chronicle-log::-webkit-scrollbar-track { background: transparent; }
#chronicle-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.chronicle-entry {
  padding: 6px 0;
  border-bottom: 1px solid rgba(42, 37, 32, 0.5);
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.chronicle-tick {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
}
.chronicle-text {
  font-size: 12px;
  line-height: 1.5;
  color: var(--text-secondary);
  margin-top: 2px;
}
.cat-Battle .chronicle-text { color: #c08080; }
.cat-Economy .chronicle-text { color: #c0a868; }
.cat-Social .chronicle-text { color: #80a0c0; }
.cat-Narrative .chronicle-text { color: #a090c0; }
.cat-Crisis .chronicle-text { color: #d09060; }

/* ============================================================
   TIMELINE (bottom)
   ============================================================ */
#timeline {
  grid-area: timeline;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
}

.playback-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.play-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--border-light);
  border-radius: 50%;
  background: var(--bg-card);
  color: var(--accent-gold);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.play-btn:hover { border-color: var(--accent-gold-dim); background: var(--bg-hover); }

.speed-control {
  display: flex; align-items: center; gap: 4px;
}
.speed-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  width: 28px;
  text-align: center;
}
.speed-slider {
  width: 60px;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
.speed-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent-gold-dim);
  cursor: pointer;
  border: none;
}

.timeline-track {
  flex: 1;
  height: 40px;
  position: relative;
  cursor: pointer;
}
.timeline-canvas {
  width: 100%; height: 100%;
}

.tick-display {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  flex-shrink: 0;
  letter-spacing: 0.5px;
  min-width: 120px;
  text-align: right;
}

/* ============================================================
   SCROLLBAR
   ============================================================ */
#factions::-webkit-scrollbar { width: 4px; }
#factions::-webkit-scrollbar-track { background: transparent; }
#factions::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ============================================================
   CONNECTION STATUS
   ============================================================ */
.connection-status {
  position: fixed;
  top: 56px; right: 12px;
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 4px 10px;
  border-radius: 2px;
  z-index: 200;
  transition: all 0.3s;
}
.connection-status.connected { color: var(--accent-green); background: rgba(74,138,74,0.1); border: 1px solid rgba(74,138,74,0.2); }
.connection-status.disconnected { color: var(--accent-red); background: rgba(180,68,68,0.1); border: 1px solid rgba(180,68,68,0.2); }
.connection-status.connecting { color: var(--accent-gold); background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2); }
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <header id="header">
    <h1>Cartographer's View</h1>
    <div class="heatmap-toolbar">
      <button class="heatmap-btn threat" data-overlay="threat" onclick="toggleOverlay('threat')">Threat</button>
      <button class="heatmap-btn food" data-overlay="food" onclick="toggleOverlay('food')">Food</button>
      <button class="heatmap-btn pop" data-overlay="pop" onclick="toggleOverlay('pop')">Pop</button>
      <button class="heatmap-btn trade" data-overlay="trade" onclick="toggleOverlay('trade')">Trade</button>
    </div>
    <div class="header-info">
      <span class="season-badge" id="season-badge">Spring</span>
      <span class="header-stat">Year <span id="hdr-year">0</span></span>
      <span class="header-stat">NPCs <span id="hdr-npcs">0</span></span>
      <span class="header-stat">Monsters <span id="hdr-monsters">0</span></span>
      <span class="header-stat">Threat <span id="hdr-threat">0.0</span></span>
    </div>
  </header>

  <!-- FACTION PANEL -->
  <aside id="factions">
    <div class="panel-title">Factions</div>
    <div id="faction-list"></div>
  </aside>

  <!-- MAP -->
  <main id="map">
    <canvas id="map-canvas"></canvas>
    <div id="detail-panel">
      <button class="detail-close" onclick="closeDetail()">&times;</button>
      <div id="detail-content"></div>
    </div>
  </main>

  <!-- CHRONICLE -->
  <aside id="chronicle">
    <div class="chronicle-header">
      <div class="panel-title">Chronicle</div>
      <div class="chronicle-filters" id="chronicle-filters"></div>
    </div>
    <div id="chronicle-log"></div>
  </aside>

  <!-- TIMELINE -->
  <div id="timeline">
    <div class="playback-controls">
      <button class="play-btn" id="play-btn" onclick="togglePlay()">&#9654;</button>
      <div class="speed-control">
        <input type="range" class="speed-slider" id="speed-slider" min="1" max="20" value="5" oninput="setSpeed(this.value)">
        <span class="speed-label" id="speed-label">5x</span>
      </div>
    </div>
    <div class="timeline-track" id="timeline-track" onclick="scrubTimeline(event)">
      <canvas class="timeline-canvas" id="timeline-canvas"></canvas>
    </div>
    <div class="tick-display">
      <span id="tick-current">0</span> / <span id="tick-total">0</span>
    </div>
  </div>
</div>

<div class="connection-status connecting" id="conn-status">CONNECTING...</div>

<script>
// ============================================================
// STATE
// ============================================================
let frame = null;
let frameHistory = [];
let maxHistoryFrames = 500;
let playing = false;
let speed = 5;
let activeOverlay = null;
let activeFilters = new Set(['Battle','Economy','Social','Narrative','Crisis','Military','Diplomacy']);
let ws = null;

// Camera
let cam = { x: 0, y: 0, zoom: 1 };
let dragging = false;
let dragStart = { x: 0, y: 0 };
let camStart = { x: 0, y: 0 };

// Canvas
const mapCanvas = document.getElementById('map-canvas');
const mapCtx = mapCanvas.getContext('2d');
const tlCanvas = document.getElementById('timeline-canvas');
const tlCtx = tlCanvas.getContext('2d');

// ============================================================
// TERRAIN COLORS
// ============================================================
// Rimworld-style bright saturated terrain colors
const terrainColors = {
  Plains:      { r: 106, g: 148, b: 66 },
  Grassland:   { r: 118, g: 160, b: 72 },
  Forest:      { r: 56, g: 110, b: 44 },
  Jungle:      { r: 38, g: 100, b: 36 },
  Swamp:       { r: 72, g: 96, b: 56 },
  Mountains:   { r: 136, g: 128, b: 116 },
  Tundra:      { r: 190, g: 198, b: 206 },
  Glacier:     { r: 210, g: 226, b: 240 },
  Desert:      { r: 210, g: 190, b: 130 },
  Badlands:    { r: 170, g: 120, b: 80 },
  Coast:       { r: 130, g: 176, b: 190 },
  DeepOcean:   { r: 48, g: 80, b: 120 },
  CoralReef:   { r: 70, g: 140, b: 150 },
  Volcano:     { r: 140, g: 60, b: 36 },
  Caverns:     { r: 86, g: 78, b: 70 },
  FlyingIslands:{ r: 160, g: 186, b: 220 },
  AncientRuins:{ r: 148, g: 136, b: 116 },
  DeathZone:   { r: 70, g: 44, b: 56 },
};

const seasonTints = {
  Spring: { r: 0, g: 20, b: 0 },
  Summer: { r: 0, g: 10, b: -10 },
  Autumn: { r: 20, g: 5, b: -15 },
  Winter: { r: -10, g: 0, b: 20 },
};

const categoryColors = {
  Battle:    '#c08080',
  Economy:   '#c0a868',
  Social:    '#80a0c0',
  Narrative: '#a090c0',
  Crisis:    '#d09060',
  Military:  '#c07070',
  Diplomacy: '#70a0a0',
};

// ============================================================
// WEBSOCKET
// ============================================================
function connect() {
  const status = document.getElementById('conn-status');
  status.className = 'connection-status connecting';
  status.textContent = 'CONNECTING...';

  ws = new WebSocket('ws://localhost:9090');
  ws.onopen = () => {
    status.className = 'connection-status connected';
    status.textContent = 'LIVE';
    setTimeout(() => { status.style.opacity = '0.4'; }, 2000);
  };
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      // When paused, still store the latest frame but don't render continuously
      if (!playing) {
        frame = data; // keep latest for when we unpause
        // Update header stats even when paused so you see where you are
        if (frameHistory.length >= maxHistoryFrames) frameHistory.shift();
        frameHistory.push({ tick: data.tick, npcs: data.summary.alive_npcs, monsters: data.summary.alive_monsters });
        updateHeader();
        renderTimeline();
        return;
      }
      onFrame(data);
    } catch(err) { console.error('Parse error:', err); }
  };
  ws.onclose = () => {
    status.className = 'connection-status disconnected';
    status.textContent = 'DISCONNECTED';
    status.style.opacity = '1';
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
}

// ============================================================
// DEMO DATA (when no WebSocket)
// ============================================================
function generateDemoFrame(tick) {
  const season = ['Spring','Summer','Autumn','Winter'][Math.floor(tick / 1200) % 4];
  const year = Math.floor(tick / 4800);
  const regions = [];
  const settlements = [];
  const entities = [];
  const factionData = [
    { id: 0, name: 'Azure Republic', color: [66,133,244] },
    { id: 1, name: 'Obsidian Dominion', color: [219,68,55] },
    { id: 2, name: 'Amber Principality', color: [244,180,0] },
    { id: 3, name: 'Scarlet Republic', color: [15,157,88] },
    { id: 4, name: 'Jade Order', color: [171,71,188] },
  ];
  const terrains = ['Plains','Forest','Mountains','Desert','Jungle','Tundra','Swamp','Badlands'];
  const cols = 4, rows = 3;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const id = r * cols + c;
      regions.push({
        id, name: `Region_${id}`,
        terrain: terrains[id % terrains.length],
        pos: [c * 200 + 100, r * 200 + 100],
        faction_color: factionData[id % 5].color,
        threat_level: Math.sin(tick * 0.01 + id) * 0.3 + 0.3,
        monster_density: Math.cos(tick * 0.005 + id) * 0.2 + 0.3,
        unrest: Math.random() * 0.3,
        control: 0.5 + Math.random() * 0.5,
      });
    }
  }
  const specials = ['Mining','Farming','Military','Trading','General'];
  for (let i = 0; i < 8; i++) {
    const rx = (i % 4) * 200 + 80 + Math.sin(i * 1.5) * 40;
    const ry = Math.floor(i / 4) * 200 + 80 + Math.cos(i * 1.3) * 40;
    settlements.push({
      id: i, name: ['Ironhold','Ashenmoor','Greyhold','Willowfen','Darkkeep','Eastgrove','Thornmarch','Highhaven'][i],
      pos: [rx, ry],
      faction_color: factionData[i % 5].color,
      population: 80 + Math.floor(Math.sin(tick * 0.002 + i) * 40 + 40),
      treasury: 100 + Math.sin(tick * 0.003 + i) * 200,
      specialty: specials[i % 5],
      threat_level: Math.sin(tick * 0.01 + i) * 0.3 + 0.2,
    });
  }
  const npcCount = Math.max(50, 200 - Math.floor(tick * 0.02));
  for (let i = 0; i < npcCount; i++) {
    const sid = i % 8;
    const s = settlements[sid];
    entities.push({
      id: i, pos: [s.pos[0] + (Math.sin(i * 3.1 + tick * 0.01) * 30), s.pos[1] + (Math.cos(i * 2.7 + tick * 0.01) * 30)],
      kind: 0, team: 0, alive: true, level: 1 + (i % 10),
      name: ['Korrin','Thessa','Varak','Elara','Nyx','Dain','Miri','Sorin','Zara','Rook'][i % 10],
    });
  }
  for (let i = 0; i < 30; i++) {
    const angle = tick * 0.001 + i * 0.5;
    const dist = 250 + Math.sin(tick * 0.002 + i) * 100;
    entities.push({
      id: 1000 + i, pos: [400 + Math.cos(angle) * dist, 300 + Math.sin(angle) * dist],
      kind: 1, team: 1, alive: true, level: 3 + (i % 8), name: null,
    });
  }
  const tradeRoutes = [];
  for (let i = 0; i < settlements.length - 1; i++) {
    if (Math.random() < 0.4) {
      tradeRoutes.push({
        from_pos: settlements[i].pos, to_pos: settlements[i+1].pos,
        strength: 0.3 + Math.random() * 0.7,
      });
    }
  }
  const cats = ['Battle','Economy','Social','Narrative','Crisis'];
  const events = [];
  if (tick % 20 === 0) {
    events.push({ tick, category: cats[Math.floor(Math.random() * cats.length)], text: `Tick ${tick}: A significant event occurred in the realm.` });
  }
  return {
    tick, total_ticks: 5000,
    settlements, entities,
    factions: factionData.map((f, i) => ({
      ...f, territory_count: 1 + (i % 3),
      military: 40 + Math.sin(tick * 0.005 + i) * 30,
      stance: ['Neutral','Hostile','Friendly','AtWar','Coalition'][i % 5],
      treasury: 500 + Math.sin(tick * 0.003 + i) * 400,
    })),
    regions, trade_routes: tradeRoutes, events,
    summary: {
      alive_npcs: npcCount, alive_monsters: 30,
      total_population: npcCount, avg_threat: 0.25,
      season, year,
    },
  };
}

// ============================================================
// FRAME PROCESSING
// ============================================================
function onFrame(data) {
  frame = data;
  if (frameHistory.length >= maxHistoryFrames) frameHistory.shift();
  frameHistory.push({ tick: data.tick, npcs: data.summary.alive_npcs, monsters: data.summary.alive_monsters });
  updateHeader();
  updateFactions();
  updateChronicle();
  renderMap();
  renderTimeline();
}

// ============================================================
// HEADER
// ============================================================
function updateHeader() {
  if (!frame) return;
  const s = frame.summary;
  document.getElementById('hdr-year').textContent = s.year;
  document.getElementById('hdr-npcs').textContent = s.alive_npcs;
  document.getElementById('hdr-monsters').textContent = s.alive_monsters;
  document.getElementById('hdr-threat').textContent = s.avg_threat.toFixed(2);
  const badge = document.getElementById('season-badge');
  badge.textContent = s.season;
  badge.className = `season-badge season-${s.season}`;
}

// ============================================================
// FACTIONS
// ============================================================
function updateFactions() {
  if (!frame) return;
  const container = document.getElementById('faction-list');
  container.innerHTML = frame.factions.map(f => {
    const [r,g,b] = f.color;
    const milPct = Math.min(100, f.military);
    return `<div class="faction-card">
      <div class="faction-name">
        <span class="faction-swatch" style="background:rgb(${r},${g},${b}); --sw-r:${r}; --sw-g:${g}; --sw-b:${b};"></span>
        ${f.name}
      </div>
      <div class="faction-detail">
        ${f.stance} &middot; ${f.territory_count} territories<br>
        Treasury: ${f.treasury.toFixed(0)}g &middot; Mil: ${f.military.toFixed(0)}
      </div>
      <div class="faction-bar"><div class="faction-bar-fill" style="width:${milPct}%; background:rgb(${r},${g},${b});"></div></div>
    </div>`;
  }).join('');
}

// ============================================================
// CHRONICLE
// ============================================================
function updateChronicle() {
  if (!frame) return;
  // Filters
  const filterContainer = document.getElementById('chronicle-filters');
  if (filterContainer.children.length === 0) {
    Object.keys(categoryColors).forEach(cat => {
      const chip = document.createElement('button');
      chip.className = `filter-chip ${activeFilters.has(cat) ? 'active' : ''}`;
      chip.textContent = cat;
      chip.style.color = activeFilters.has(cat) ? categoryColors[cat] : '';
      chip.onclick = () => {
        if (activeFilters.has(cat)) activeFilters.delete(cat); else activeFilters.add(cat);
        chip.className = `filter-chip ${activeFilters.has(cat) ? 'active' : ''}`;
        chip.style.color = activeFilters.has(cat) ? categoryColors[cat] : '';
        renderChronicleLog();
      };
      filterContainer.appendChild(chip);
    });
  }
  // Add new events
  frame.events.forEach(evt => {
    if (!activeFilters.has(evt.category)) return;
    const log = document.getElementById('chronicle-log');
    const entry = document.createElement('div');
    entry.className = `chronicle-entry cat-${evt.category}`;
    entry.innerHTML = `<div class="chronicle-tick">Tick ${evt.tick}</div><div class="chronicle-text">${evt.text}</div>`;
    log.prepend(entry);
    // Limit entries
    while (log.children.length > 100) log.removeChild(log.lastChild);
  });
}

function renderChronicleLog() {
  // Re-render would need full event history — for now just toggle visibility
}

// ============================================================
// MAP RENDERING
// ============================================================
function resizeCanvases() {
  const mapRect = document.getElementById('map').getBoundingClientRect();
  mapCanvas.width = mapRect.width * devicePixelRatio;
  mapCanvas.height = mapRect.height * devicePixelRatio;
  mapCanvas.style.width = mapRect.width + 'px';
  mapCanvas.style.height = mapRect.height + 'px';
  mapCtx.scale(devicePixelRatio, devicePixelRatio);

  const tlRect = document.getElementById('timeline-track').getBoundingClientRect();
  tlCanvas.width = tlRect.width * devicePixelRatio;
  tlCanvas.height = tlRect.height * devicePixelRatio;
  tlCanvas.style.width = tlRect.width + 'px';
  tlCanvas.style.height = tlRect.height + 'px';
  tlCtx.scale(devicePixelRatio, devicePixelRatio);
}

function renderMap() {
  if (!frame) return;
  const w = mapCanvas.width / devicePixelRatio;
  const h = mapCanvas.height / devicePixelRatio;
  const ctx = mapCtx;
  ctx.save();
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.clearRect(0, 0, w, h);

  // Season tint
  const season = frame.summary.season;
  const tint = seasonTints[season] || { r: 0, g: 0, b: 0 };

  // World bounds
  const positions = [...frame.settlements.map(s => s.pos), ...frame.regions.map(r => r.pos)];
  if (positions.length === 0) { ctx.restore(); return; }
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const [px, py] of positions) {
    minX = Math.min(minX, px); maxX = Math.max(maxX, px);
    minY = Math.min(minY, py); maxY = Math.max(maxY, py);
  }
  const pad = Math.max(maxX - minX, maxY - minY) * 0.25;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;

  const rangeX = (maxX - minX) / cam.zoom;
  const rangeY = (maxY - minY) / cam.zoom;
  const cx = (minX + maxX) / 2 + cam.x;
  const cy = (minY + maxY) / 2 + cam.y;

  function project(wx, wy) {
    return [
      (wx - cx) / rangeX * w + w / 2,
      (wy - cy) / rangeY * h + h / 2,
    ];
  }

  // --- Terrain: Rimworld-style discrete tile grid ---
  if (frame.regions.length > 0) {
    const projRegions = frame.regions.map(r => {
      const [sx, sy] = project(r.pos[0], r.pos[1]);
      const tc = terrainColors[r.terrain] || { r: 80, g: 80, b: 80 };
      return { sx, sy, tc, region: r };
    });

    // Per-tile hash for subtle color variation
    function tileHash(x, y) {
      let h = (x * 374761393 + y * 668265263 + 1013904223) | 0;
      h = (h ^ (h >> 13)) * 1274126177;
      return ((h ^ (h >> 16)) & 0x7fffffff) / 0x7fffffff;
    }

    // Each world tile = 4 world units
    const worldTileSize = 4.0;
    const [refX0] = project(0, 0);
    const [refX1] = project(worldTileSize, 0);
    const tilePx = Math.abs(refX1 - refX0);

    if (tilePx >= 1) {
      // Visible world bounds
      const visMinWx = cx - rangeX / 2;
      const visMaxWx = cx + rangeX / 2;
      const visMinWy = cy - rangeY / 2;
      const visMaxWy = cy + rangeY / 2;

      const startTx = Math.floor(visMinWx / worldTileSize);
      const endTx = Math.ceil(visMaxWx / worldTileSize);
      const startTy = Math.floor(visMinWy / worldTileSize);
      const endTy = Math.ceil(visMaxWy / worldTileSize);

      for (let ty = startTy; ty <= endTy; ty++) {
        for (let tx = startTx; tx <= endTx; tx++) {
          const wx = tx * worldTileSize;
          const wy = ty * worldTileSize;

          // Nearest region
          let minDist = Infinity, nearest = null;
          for (const pr of projRegions) {
            const dx = wx - pr.region.pos[0], dy = wy - pr.region.pos[1];
            const d = dx * dx + dy * dy;
            if (d < minDist) { minDist = d; nearest = pr; }
          }
          if (!nearest) continue;

          const [sx, sy] = project(wx, wy);
          const tc = nearest.tc;

          // Per-tile variation ±12
          const tv = (tileHash(tx, ty) - 0.5) * 24;
          let cr = tc.r + tv;
          let cg = tc.g + tv;
          let cb = tc.b + tv;

          // Season tint
          cr += tint.r * 2; cg += tint.g * 2; cb += tint.b * 2;

          // Heatmap overlays
          const ar = nearest.region;
          if (activeOverlay === 'threat') {
            const t = ar.threat_level;
            cr = cr * (1 - t * 0.4) + 220 * t * 0.4;
            cg *= (1 - t * 0.5); cb *= (1 - t * 0.5);
          } else if (activeOverlay === 'pop') {
            let pd = 0;
            for (const s of frame.settlements) {
              const dx2 = ar.pos[0] - s.pos[0], dy2 = ar.pos[1] - s.pos[1];
              const d2 = Math.sqrt(dx2*dx2 + dy2*dy2);
              if (d2 < 200) pd += s.population / (d2 + 50);
            }
            pd = Math.min(1, pd / 5);
            cb += 100 * pd; cr *= (1 - pd * 0.2);
          } else if (activeOverlay === 'food') {
            cg += 50 * (1 - ar.monster_density);
          } else if (activeOverlay === 'trade') {
            for (const tr of frame.trade_routes) {
              const mx = (tr.from_pos[0] + tr.to_pos[0]) / 2;
              const my = (tr.from_pos[1] + tr.to_pos[1]) / 2;
              const dx2 = ar.pos[0] - mx, dy2 = ar.pos[1] - my;
              if (dx2*dx2 + dy2*dy2 < 40000) { cr += 40 * tr.strength; cg += 25 * tr.strength; }
            }
          }

          cr = Math.max(0, Math.min(255, cr));
          cg = Math.max(0, Math.min(255, cg));
          cb = Math.max(0, Math.min(255, cb));

          ctx.fillStyle = `rgb(${cr|0},${cg|0},${cb|0})`;
          const gap = tilePx > 8 ? 0.5 : 0;
          ctx.fillRect(sx, sy, Math.ceil(tilePx) - gap, Math.ceil(tilePx) - gap);
        }
      }
    } else {
      // Too zoomed out — fill solid per region
      for (const pr of projRegions) {
        const radius = 80 / cam.zoom;
        const tc = pr.tc;
        ctx.fillStyle = `rgba(${tc.r},${tc.g},${tc.b},0.7)`;
        ctx.beginPath();
        ctx.arc(pr.sx, pr.sy, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // --- City grids (tile-based buildings) ---
  // Only render when zoomed in enough that cells are at least 3px
  if (frame.city_grids && frame.city_grids.length > 0) {
    for (const grid of frame.city_grids) {
      // Check if this grid is visible at current zoom
      const gridWorldSize = grid.cols * grid.cell_size;
      const [gcx, gcy] = project(grid.center_pos[0], grid.center_pos[1]);
      const halfCols = grid.cols / 2, halfRows = grid.rows / 2;

      // Project one cell to see how big it is on screen
      const [x0] = project(grid.center_pos[0], grid.center_pos[1]);
      const [x1] = project(grid.center_pos[0] + grid.cell_size, grid.center_pos[1]);
      const cellPx = Math.abs(x1 - x0);

      // Skip if cells are too small to see (< 2px) or grid is off screen
      if (cellPx < 2) continue;
      if (gcx + halfCols * cellPx < 0 || gcx - halfCols * cellPx > w) continue;
      if (gcy + halfRows * cellPx < 0 || gcy - halfRows * cellPx > h) continue;

      const centerCol = Math.floor(grid.cols / 2);
      const centerRow = Math.floor(grid.rows / 2);

      // Cell state colors
      // state = high nibble: 0=Empty, 1=Road, 2=Building, 3=Plaza, 4=Wall, 5=Water, 6=Ruin
      // zone  = low nibble:  0=None, 1=Residential, 2=Commercial, 3=Industrial, 4=Religious, 5=Arcane, 6=Noble, 7=Military
      const zoneColors = [
        null,                          // 0 None
        [140, 120, 90],                // 1 Residential (warm tan)
        [180, 160, 80],                // 2 Commercial (gold)
        [120, 100, 80],                // 3 Industrial (brown)
        [130, 110, 160],               // 4 Religious (purple)
        [80, 120, 160],                // 5 Arcane (blue)
        [160, 140, 100],               // 6 Noble (cream)
        [140, 80, 80],                 // 7 Military (red-brown)
      ];

      for (let row = 0; row < grid.rows; row++) {
        for (let col = 0; col < grid.cols; col++) {
          const idx = row * grid.cols + col;
          const packed = grid.cells[idx];
          const cellState = packed >> 4;
          const zone = packed & 0xf;

          if (cellState === 0) continue; // Empty — skip

          // World position of this cell
          const wx = grid.center_pos[0] + (col - centerCol) * grid.cell_size;
          const wy = grid.center_pos[1] + (row - centerRow) * grid.cell_size;
          const [sx, sy] = project(wx, wy);

          // Skip off-screen cells
          if (sx + cellPx < 0 || sx - cellPx > w || sy + cellPx < 0 || sy - cellPx > h) continue;

          const dens = grid.density[idx];
          const road = grid.road_tier[idx];

          if (cellState === 1) {
            // Road
            const roadAlpha = 0.3 + road * 0.12;
            const roadWidth = cellPx * (0.3 + road * 0.15);
            ctx.fillStyle = `rgba(100, 90, 70, ${roadAlpha})`;
            ctx.fillRect(sx - roadWidth/2, sy - roadWidth/2, roadWidth, roadWidth);
          } else if (cellState === 2) {
            // Building — color by zone, size by density
            const zc = zoneColors[zone] || [130, 120, 100];
            const densScale = 0.5 + dens * 0.17;
            const bw = cellPx * densScale;
            const brightness = 0.5 + dens * 0.1;
            ctx.fillStyle = `rgba(${zc[0] * brightness}, ${zc[1] * brightness}, ${zc[2] * brightness}, 0.8)`;
            ctx.fillRect(sx - bw/2, sy - bw/2, bw, bw);
            // Outline
            ctx.strokeStyle = `rgba(${zc[0]}, ${zc[1]}, ${zc[2]}, 0.4)`;
            ctx.lineWidth = Math.max(0.5, cellPx * 0.08);
            ctx.strokeRect(sx - bw/2, sy - bw/2, bw, bw);
          } else if (cellState === 3) {
            // Plaza — open square
            ctx.fillStyle = 'rgba(160, 150, 120, 0.3)';
            ctx.fillRect(sx - cellPx * 0.4, sy - cellPx * 0.4, cellPx * 0.8, cellPx * 0.8);
          } else if (cellState === 4) {
            // Wall — solid dark line
            ctx.fillStyle = 'rgba(80, 70, 60, 0.7)';
            ctx.fillRect(sx - cellPx * 0.45, sy - cellPx * 0.45, cellPx * 0.9, cellPx * 0.9);
          } else if (cellState === 5) {
            // Water
            ctx.fillStyle = 'rgba(50, 80, 120, 0.4)';
            ctx.fillRect(sx - cellPx * 0.45, sy - cellPx * 0.45, cellPx * 0.9, cellPx * 0.9);
          } else if (cellState === 6) {
            // Ruin — faded outline
            ctx.strokeStyle = 'rgba(100, 90, 70, 0.3)';
            ctx.lineWidth = Math.max(0.5, cellPx * 0.06);
            ctx.strokeRect(sx - cellPx * 0.3, sy - cellPx * 0.3, cellPx * 0.6, cellPx * 0.6);
          }
        }
      }
    }
  }

  // --- Trade routes ---
  for (const route of frame.trade_routes) {
    const [sx1, sy1] = project(route.from_pos[0], route.from_pos[1]);
    const [sx2, sy2] = project(route.to_pos[0], route.to_pos[1]);
    const strength = route.strength || 0.5;
    ctx.beginPath();
    ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2);
    ctx.strokeStyle = `rgba(201, 168, 76, ${strength * 0.4})`;
    ctx.lineWidth = 1 + strength * 2;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Buildings are now rendered via city grid tiles above.
  // Entity kind=2 (buildings) are skipped in the entity loop below.

  // --- Entities (NPCs + monsters) ---
  // Fixed small size — entities are dots, not circles that grow with zoom
  const npcRadius = Math.min(3, Math.max(1.5, 2 * cam.zoom * 0.3));
  const monsterR = Math.min(4, Math.max(2, 2.5 * cam.zoom * 0.3));
  for (const ent of frame.entities) {
    if (!ent.alive || ent.kind === 2) continue;
    const [sx, sy] = project(ent.pos[0], ent.pos[1]);
    if (sx < -10 || sx > w + 10 || sy < -10 || sy > h + 10) continue;

    if (ent.kind === 1) {
      // Monster — small diamond
      ctx.beginPath();
      ctx.moveTo(sx, sy - monsterR); ctx.lineTo(sx + monsterR * 0.7, sy);
      ctx.lineTo(sx, sy + monsterR); ctx.lineTo(sx - monsterR * 0.7, sy);
      ctx.closePath();
      ctx.fillStyle = 'rgba(219, 68, 55, 0.7)';
      ctx.fill();
    } else {
      // NPC — small circle
      const teamColors = ['rgba(100,160,220,0.6)','rgba(219,68,55,0.6)','rgba(160,160,140,0.5)'];
      ctx.beginPath();
      ctx.arc(sx, sy, npcRadius, 0, Math.PI * 2);
      ctx.fillStyle = teamColors[ent.team] || teamColors[2];
      ctx.fill();
    }
  }

  // --- Entity names: only for NAMED entities (not "Entity #1234") at high zoom ---
  if (cam.zoom > 6) {
    ctx.font = `400 ${Math.max(7, 9)}px "JetBrains Mono", monospace`;
    ctx.textAlign = 'center';
    for (const ent of frame.entities) {
      if (!ent.alive || ent.kind === 2) continue;
      if (!ent.name || ent.name.startsWith('Entity #')) continue; // skip generic IDs
      const [sx, sy] = project(ent.pos[0], ent.pos[1]);
      if (sx < 0 || sx > w || sy < 0 || sy > h) continue;
      ctx.fillStyle = ent.kind === 1 ? 'rgba(200, 90, 70, 0.7)' : 'rgba(160, 180, 200, 0.6)';
      ctx.fillText(ent.name, sx, sy - 6);
    }
  }

  // --- Settlements ---
  for (const s of frame.settlements) {
    const [sx, sy] = project(s.pos[0], s.pos[1]);
    const radius = 6 + Math.sqrt(s.population) * 0.5;
    const [r, g, b] = s.faction_color;

    // Glow
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, radius * 3);
    grad.addColorStop(0, `rgba(${r},${g},${b},0.15)`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(sx - radius * 3, sy - radius * 3, radius * 6, radius * 6);

    // Marker
    ctx.beginPath();
    ctx.arc(sx, sy, radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},0.3)`;
    ctx.fill();
    ctx.strokeStyle = `rgba(${r},${g},${b},0.8)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Threat ring
    if (s.threat_level > 0.1) {
      ctx.beginPath();
      ctx.arc(sx, sy, radius + 4, 0, Math.PI * 2 * s.threat_level);
      ctx.strokeStyle = `rgba(200, 60, 60, ${s.threat_level})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Label
    ctx.font = '600 10px "Cinzel", serif';
    ctx.fillStyle = `rgba(${r},${g},${b},0.9)`;
    ctx.textAlign = 'center';
    ctx.fillText(s.name, sx, sy - radius - 6);
    ctx.font = '300 8px "JetBrains Mono", monospace';
    ctx.fillStyle = 'rgba(180,170,150,0.6)';
    ctx.fillText(`pop ${s.population}`, sx, sy + radius + 12);
  }

  ctx.restore();
}

// ============================================================
// TIMELINE
// ============================================================
function renderTimeline() {
  if (!frame) return;
  const w = tlCanvas.width / devicePixelRatio;
  const h = tlCanvas.height / devicePixelRatio;
  const ctx = tlCtx;
  ctx.save();
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.clearRect(0, 0, w, h);

  // Population sparkline
  if (frameHistory.length > 1) {
    const maxPop = Math.max(...frameHistory.map(f => f.npcs), 1);
    ctx.beginPath();
    for (let i = 0; i < frameHistory.length; i++) {
      const x = (i / (frameHistory.length - 1)) * w;
      const y = h - (frameHistory[i].npcs / maxPop) * (h * 0.8) - 2;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(100, 160, 220, 0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Monster sparkline
    const maxMon = Math.max(...frameHistory.map(f => f.monsters), 1);
    ctx.beginPath();
    for (let i = 0; i < frameHistory.length; i++) {
      const x = (i / (frameHistory.length - 1)) * w;
      const y = h - (frameHistory[i].monsters / maxMon) * (h * 0.4) - 2;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(219, 68, 55, 0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Current tick marker
  if (frame.total_ticks > 0) {
    const x = (frame.tick / frame.total_ticks) * w;
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, h);
    ctx.strokeStyle = 'rgba(201, 168, 76, 0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Triangle marker
    ctx.beginPath();
    ctx.moveTo(x - 4, 0); ctx.lineTo(x + 4, 0); ctx.lineTo(x, 6);
    ctx.fillStyle = 'rgba(201, 168, 76, 0.8)';
    ctx.fill();
  }

  document.getElementById('tick-current').textContent = frame.tick;
  document.getElementById('tick-total').textContent = frame.total_ticks;

  ctx.restore();
}

// ============================================================
// DETAIL PANEL
// ============================================================
function showEntityDetail(entity) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const name = entity.name || `Entity #${entity.id}`;
  const kindName = entity.kind === 0 ? 'NPC' : entity.kind === 1 ? 'Monster' : 'Entity';
  content.innerHTML = `
    <div class="detail-title">${name}</div>
    <div class="detail-subtitle">${kindName} &middot; Level ${entity.level}</div>
    <div class="detail-section">
      <div class="detail-section-title">Biography</div>
      <div class="detail-text"><em>${name}</em> is a level ${entity.level} ${kindName.toLowerCase()} roaming the lands. Their story continues to unfold with each passing season.</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Position</div>
      <div class="detail-text" style="font-family:var(--font-mono);font-size:10px;">
        (${entity.pos[0].toFixed(1)}, ${entity.pos[1].toFixed(1)})
      </div>
    </div>
  `;
  panel.classList.add('visible');
}

function showSettlementDetail(settlement) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const commodities = ['Food','Iron','Wood','Equipment','Medicine','Leather','Stone','Cloth'];
  const barColors = ['#6a8a40','#8a7060','#7a6a40','#6080a0','#60a060','#8a7060','#808080','#a08060'];

  let stockpileHTML = '';
  // Simulated stockpile (real data would come from extended TraceFrame)
  for (let i = 0; i < 8; i++) {
    const val = Math.random() * 100;
    stockpileHTML += `<div class="stockpile-bar">
      <span class="stockpile-bar-label">${commodities[i]}</span>
      <div class="stockpile-bar-track"><div class="stockpile-bar-fill" style="width:${val}%;background:${barColors[i]};"></div></div>
      <span class="stockpile-bar-val">${val.toFixed(0)}</span>
    </div>`;
  }

  const threatPct = Math.min(100, settlement.threat_level * 100);
  const threatColor = settlement.threat_level < 0.3 ? '#4a8a4a' : settlement.threat_level < 0.6 ? '#c0a040' : '#b44';

  content.innerHTML = `
    <div class="detail-title">${settlement.name}</div>
    <div class="detail-subtitle">${settlement.specialty} &middot; Pop ${settlement.population}</div>
    <div class="detail-section">
      <div class="detail-section-title">Treasury</div>
      <div class="detail-text" style="font-family:var(--font-mono);font-size:13px;color:var(--accent-gold);">${settlement.treasury.toFixed(0)}g</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Threat Level</div>
      <div class="threat-gauge"><div class="threat-gauge-fill" style="width:${threatPct}%;background:${threatColor};"></div></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Stockpile</div>
      ${stockpileHTML}
    </div>
  `;
  panel.classList.add('visible');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
}

// ============================================================
// INTERACTIONS
// ============================================================
function toggleOverlay(name) {
  activeOverlay = activeOverlay === name ? null : name;
  document.querySelectorAll('.heatmap-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.overlay === activeOverlay);
  });
  renderMap();
}

function togglePlay() {
  playing = !playing;
  document.getElementById('play-btn').innerHTML = playing ? '&#10074;&#10074;' : '&#9654;';
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ command: playing ? 'play' : 'pause' }));
  }
}

function setSpeed(val) {
  speed = parseInt(val);
  document.getElementById('speed-label').textContent = val + 'x';
  // Tell the server to adjust ticks per frame
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ command: 'speed', value: speed }));
  }
}

function scrubTimeline(event) {
  const rect = event.currentTarget.getBoundingClientRect();
  const pct = (event.clientX - rect.left) / rect.width;
  // Would send seek command to WebSocket
  console.log('Scrub to', Math.floor(pct * (frame?.total_ticks || 5000)));
}

// Map interactions
mapCanvas.addEventListener('mousedown', (e) => {
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  camStart = { x: cam.x, y: cam.y };
});
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const dx = e.clientX - dragStart.x;
  const dy = e.clientY - dragStart.y;
  cam.x = camStart.x - dx / cam.zoom;
  cam.y = camStart.y - dy / cam.zoom;
  renderMap();
});
window.addEventListener('mouseup', () => { dragging = false; });
mapCanvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  cam.zoom *= e.deltaY < 0 ? 1.15 : 0.87;
  cam.zoom = Math.max(0.3, Math.min(50, cam.zoom));
  renderMap();
}, { passive: false });

// Click to inspect
mapCanvas.addEventListener('click', (e) => {
  if (!frame) return;
  const rect = mapCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Check settlements first
  for (const s of frame.settlements) {
    const positions = [...frame.settlements.map(s2 => s2.pos), ...frame.regions.map(r => r.pos)];
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const [px, py] of positions) {
      minX = Math.min(minX, px); maxX = Math.max(maxX, px);
      minY = Math.min(minY, py); maxY = Math.max(maxY, py);
    }
    const pad2 = Math.max(maxX - minX, maxY - minY) * 0.25;
    minX -= pad2; minY -= pad2; maxX += pad2; maxY += pad2;
    const w2 = rect.width, h2 = rect.height;
    const rangeX = (maxX - minX) / cam.zoom;
    const rangeY = (maxY - minY) / cam.zoom;
    const cx2 = (minX + maxX) / 2 + cam.x;
    const cy2 = (minY + maxY) / 2 + cam.y;
    const sx = (s.pos[0] - cx2) / rangeX * w2 + w2 / 2;
    const sy = (s.pos[1] - cy2) / rangeY * h2 + h2 / 2;
    const dist = Math.sqrt((mx - sx) ** 2 + (my - sy) ** 2);
    if (dist < 20) { showSettlementDetail(s); return; }
  }

  // Check entities
  for (const ent of frame.entities) {
    if (!ent.alive) continue;
    const positions = [...frame.settlements.map(s => s.pos), ...frame.regions.map(r => r.pos)];
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const [px, py] of positions) {
      minX = Math.min(minX, px); maxX = Math.max(maxX, px);
      minY = Math.min(minY, py); maxY = Math.max(maxY, py);
    }
    const pad2 = Math.max(maxX - minX, maxY - minY) * 0.25;
    minX -= pad2; minY -= pad2; maxX += pad2; maxY += pad2;
    const w2 = rect.width, h2 = rect.height;
    const rangeX = (maxX - minX) / cam.zoom;
    const rangeY = (maxY - minY) / cam.zoom;
    const cx2 = (minX + maxX) / 2 + cam.x;
    const cy2 = (minY + maxY) / 2 + cam.y;
    const sx = (ent.pos[0] - cx2) / rangeX * w2 + w2 / 2;
    const sy = (ent.pos[1] - cy2) / rangeY * h2 + h2 / 2;
    const dist = Math.sqrt((mx - sx) ** 2 + (my - sy) ** 2);
    if (dist < 8) { showEntityDetail(ent); return; }
  }

  closeDetail();
});

// ============================================================
// INIT & LOOP
// ============================================================
window.addEventListener('resize', () => { resizeCanvases(); renderMap(); renderTimeline(); });
resizeCanvases();

// Try WebSocket, fall back to demo
connect();

// Demo loop (when no WebSocket data)
let demoTick = 0;
setInterval(() => {
  if (frame && ws && ws.readyState === WebSocket.OPEN) return; // Real data
  if (!playing && frame) return;
  demoTick += speed;
  onFrame(generateDemoFrame(demoTick));
}, 50);

// Auto-play demo on load
setTimeout(() => {
  if (!frame) { playing = true; document.getElementById('play-btn').innerHTML = '&#10074;&#10074;'; }
}, 1000);
</script>
